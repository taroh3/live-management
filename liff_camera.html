<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>写真登録</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --accent: #06C755;
      --accent-dim: rgba(6, 199, 85, 0.15);
      --accent-glow: rgba(6, 199, 85, 0.4);
      --text: #f0f0f5;
      --text-dim: #8888a0;
      --danger: #ff4d6d;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; }
    .header { width: 100%; max-width: 420px; margin-bottom: 28px; text-align: center; }
    .header-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-dim); border: 1px solid rgba(6,199,85,0.3); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; }
    .meta { font-size: 13px; color: var(--text-dim); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .card { width: 100%; max-width: 420px; background: var(--surface); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.06); overflow: hidden; }
    .drop-zone { padding: 36px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid rgba(255,255,255,0.06); position: relative; }
    .drop-zone:active { background: var(--surface2); }
    .drop-zone.disabled { opacity: 0.4; pointer-events: none; }
    .drop-icon { width: 64px; height: 64px; background: var(--accent-dim); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px dashed rgba(6,199,85,0.4); transition: transform 0.2s, border-color 0.2s; }
    .drop-label { font-size: 16px; font-weight: 600; color: var(--accent); }
    .drop-hint { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.5; }
    input[type="file"] { display: none; }
    .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; background: var(--bg); }
    .preview-item { position: relative; aspect-ratio: 1; overflow: hidden; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-item .remove-btn { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: white; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .preview-item .order-badge { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 2px 6px; font-size: 10px; color: white; font-weight: 600; }
    .counter-bar { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .counter-num { font-size: 13px; font-weight: 700; color: var(--accent); }
    .status-bar { padding: 14px 16px; background: var(--surface2); border-top: 1px solid rgba(255,255,255,0.06); }
    .status-text { font-size: 13px; color: var(--text-dim); text-align: center; }
    .submit-btn { width: 100%; max-width: 420px; margin-top: 16px; padding: 16px; background: var(--accent); color: #000; font-size: 16px; font-weight: 700; border: none; border-radius: var(--radius); cursor: pointer; }
    .submit-btn:disabled { opacity: 0.3; pointer-events: none; }
    .progress-wrap { width: 100%; max-width: 420px; margin-top: 12px; display: none; }
    .progress-bar-bg { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
    .done-screen { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 24px; text-align: center; width: 100%; }
    .done-icon { width: 72px; height: 72px; background: var(--accent-dim); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; border: 2px solid var(--accent); }
    .close-btn { padding: 14px 32px; background: var(--accent); color: #000; font-weight: 700; border: none; border-radius: 40px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-badge"><span>●</span> LIVE ARCHIVE</div>
    <h1 id="page-title">📸 写真登録</h1>
    <p class="meta" id="page-meta">読み込み中...</p>
  </div>

  <div class="card" id="main-card">
    <div class="drop-zone disabled" id="dropZone">
      <div class="drop-icon">📷</div>
      <div class="drop-label">写真を選択</div>
      <div class="drop-hint">タップして写真ライブラリから<br>複数枚選択できます</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="preview-grid" id="previewGrid"></div>
    <div class="counter-bar" id="counterBar" style="display:none">
      <span class="counter-text">選択中</span>
      <span class="counter-num" id="countDisplay">0枚</span>
    </div>
    <div class="status-bar">
      <p class="status-text" id="statusText">初期化中...</p>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" disabled>送信する</button>

  <div class="progress-wrap" id="progressWrap">
    <p class="progress-label" id="progressLabel">送信中 1/1...</p>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>

  <div class="done-screen" id="doneScreen">
    <div class="done-icon">✅</div>
    <p class="done-title">登録完了</p>
    <p class="done-sub" id="doneMsg">写真を登録しました</p>
    <button class="close-btn" onclick="liff.closeWindow()">閉じる</button>
  </div>

<script>
const CONFIG = {
  LIFF_ID:      "2009827233-Vsz01EGH",
  GAS_URL:      "https://throbbing-base-9480.taroh3333.workers.dev",
  MAX_PHOTOS:   10,
  SEND_DELAY_MS: 800
};

let payload_base  = {};
let selectedFiles = [];

const dropZone    = document.getElementById('dropZone');
const fileInput   = document.getElementById('fileInput');
const previewGrid = document.getElementById('previewGrid');
const counterBar  = document.getElementById('counterBar');
const countDisplay = document.getElementById('countDisplay');
const statusText  = document.getElementById('statusText');
const submitBtn   = document.getElementById('submitBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const doneScreen  = document.getElementById('doneScreen');
const mainCard    = document.getElementById('main-card');

function setStatus(msg, type = '') {
  statusText.textContent = msg;
  statusText.className   = 'status-text' + (type ? ' ' + type : '');
}
function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

window.onload = async () => {
  try {
    setStatus('LIFF初期化中...');
    await liff.init({ liffId: CONFIG.LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href });
      return;
    }

    // 【修正】liff.getContext()でuserIdを同期的に取得
    // getProfile()は非同期・セキュリティ上の懸念があるため
    // getContext()を使用（liff.init()後すぐ利用可能）
    let userId = null;
    try {
      const context = liff.getContext();
      userId = context ? context.userId : null;
    } catch (e) {
      console.warn('getContext失敗:', e);
    }

    // getContext()でuserIdが取得できない場合はgetProfile()で補完
    if (!userId) {
      try {
        const profile = await liff.getProfile();
        userId = profile ? profile.userId : null;
      } catch (e) {
        console.warn('getProfile失敗:', e);
      }
    }

    const urlParams = new URLSearchParams(window.location.search);

    payload_base = {
      p_id:      urlParams.get('p_id')      || '',
      artist_id: urlParams.get('artist_id') || '',
      title:     urlParams.get('title')     || '写真',
      inputType: urlParams.get('inputType') || 'poster_image',
      userId:    userId || ''  // 【修正】userIdを追加
    };

    // inputTypeに基づいてタイトルを表示
    const titleMap = {
      'poster_image':  '📸 ポスター写真登録',
      'setlist_image': '📋 セトリ写真登録',
      'poster':        '📸 ポスター写真登録',
      'setlist':       '📋 セトリ写真登録',
      'general':       '🖼 写真登録'
    };
    document.getElementById('page-title').textContent =
      titleMap[payload_base.inputType] || '📸 写真登録';
    document.getElementById('page-meta').textContent =
      payload_base.title || 'タイトル未設定';

    dropZone.classList.remove('disabled');
    setStatus(`写真を選択してください（最大${CONFIG.MAX_PHOTOS}枚）`);

  } catch (err) {
    setStatus('初期化エラー: ' + err.message, 'error');
  }
};

dropZone.addEventListener('click', () => {
  if (!dropZone.classList.contains('disabled')) fileInput.click();
});

fileInput.addEventListener('change', async (e) => {
  const files     = Array.from(e.target.files);
  const remaining = CONFIG.MAX_PHOTOS - selectedFiles.length;
  const toAdd     = files.slice(0, remaining);

  for (const file of toAdd) {
    const dataUrl = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
    selectedFiles.push({ file, dataUrl });
    const item = document.createElement('div');
    item.className = 'preview-item';
    item.innerHTML = `
      <img src="${dataUrl}">
      <button class="remove-btn" onclick="removePhoto(${selectedFiles.length - 1})">×</button>
      <span class="order-badge">${selectedFiles.length}</span>`;
    previewGrid.appendChild(item);
  }
  updateUI();
  fileInput.value = '';
});

function removePhoto(index) {
  selectedFiles.splice(index, 1);
  previewGrid.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'preview-item';
    item.innerHTML = `
      <img src="${f.dataUrl}">
      <button class="remove-btn" onclick="removePhoto(${i})">×</button>
      <span class="order-badge">${i + 1}</span>`;
    previewGrid.appendChild(item);
  });
  updateUI();
}

function updateUI() {
  counterBar.style.display = selectedFiles.length > 0 ? 'flex' : 'none';
  countDisplay.textContent = `${selectedFiles.length}枚`;
  submitBtn.disabled       = selectedFiles.length === 0;
  submitBtn.textContent    = `${selectedFiles.length}枚を送信する`;
  setStatus(selectedFiles.length > 0
    ? `${selectedFiles.length}枚選択済み`
    : `写真を選択してください`);
}

submitBtn.addEventListener('click', async () => {
  submitBtn.disabled = true;
  dropZone.classList.add('disabled');
  progressWrap.style.display = 'block';

  let successCount = 0;

  for (let i = 0; i < selectedFiles.length; i++) {
    progressLabel.textContent = `送信中 ${i + 1} / ${selectedFiles.length}`;
    progressFill.style.width  = `${(i / selectedFiles.length) * 100}%`;

    try {
      const res = await fetch(CONFIG.GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body:    JSON.stringify({ ...payload_base, image: selectedFiles[i].dataUrl })
      });

      if (res.ok) {
        successCount++;
      } else {
        console.error(`送信失敗 ${i + 1}枚目: HTTP ${res.status}`);
      }
      await sleep(CONFIG.SEND_DELAY_MS);

    } catch (err) {
      console.error(`送信エラー ${i + 1}枚目:`, err);
    }
  }

  progressFill.style.width = '100%';
  showDone(successCount, selectedFiles.length);
});

function showDone(s, t) {
  mainCard.style.display     = 'none';
  submitBtn.style.display    = 'none';
  progressWrap.style.display = 'none';
  doneScreen.style.display   = 'flex';
  document.getElementById('doneMsg').textContent =
    `${t}枚中 ${s}枚の登録に成功しました`;
}
</script>
</body>
</html>
