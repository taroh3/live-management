<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion写真登録</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
    .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
    #preview { width: 100%; max-width: 400px; margin-top: 20px; display: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .btn { padding: 20px 40px; font-size: 18px; font-weight: bold; cursor: pointer; background: #00b900; color: white; border: none; border-radius: 10px; width: 100%; max-width: 320px; transition: 0.3s; }
    #loading { display: none; color: #333; margin-top: 20px; font-weight: bold; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="title">📸 公演写真登録</h2>
    <p id="info">写真ライブラリから選択してください</p>
    
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <button class="btn" id="selectBtn">写真を選択する</button>
    
    <div id="loading">🚀 送信中...<br>Notionへの登録準備をしています</div>
    <img id="preview">
  </div>

  <script>
    /**
     * たろう様のGAS URLを直接埋め込みました
     */
    const CONFIG = {
      LIFF_ID: "2009827233-Vsz01EGH", 
      GAS_URL: "https://script.google.com/macros/s/AKfycbzpY4HEbx5DRJxZZLWmwNOXTUGD_F4bWHoNo7SLvOgMoUJxOZ8KIfPlle_oMpN2e2gt/exec"
    };

    const urlParams = new URLSearchParams(window.location.search);
    const payload_base = {
      p_id: urlParams.get('p_id'),
      artist_id: urlParams.get('artist_id'),
      title: urlParams.get('title'),
      inputType: urlParams.get('inputType') || 'poster'
    };

    window.onload = async () => {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID });
        // ログイン処理（パラメータを保持するための修正済み）
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
      } catch (err) {
        console.error("LIFF初期化エラー:", err);
      }
    };

    document.getElementById('selectBtn').onclick = () => document.getElementById('fileInput').click();

    document.getElementById('fileInput').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (re) => {
        document.getElementById('preview').src = re.target.result;
        document.getElementById('preview').style.display = 'block';
        document.getElementById('selectBtn').style.display = 'none';
        document.getElementById('info').style.display = 'none';
        upload(re.target.result);
      };
      reader.readAsDataURL(file);
    };

    async function upload(base64Data) {
      document.getElementById('loading').style.display = 'block';
      const payload = { ...payload_base, image: base64Data };

      try {
        const res = await fetch(CONFIG.GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        const result = await res.json();
        if (result.status === "ok") {
          alert("送信に成功しました！Notionを確認してください。");
          liff.closeWindow();
        } else {
          throw new Error(result.message || "Unknown error");
        }
      } catch (err) {
        alert("送信エラーが発生しました: " + err.message);
        document.getElementById('selectBtn').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
      }
    }
  </script>
</body>
</html>
