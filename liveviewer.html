<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="たろうのLiveViewer">
  <link rel="manifest" href="liveviewer_manifest.json">
  <title>たろうのLiveViewer</title>
  <style>
    :root {
      --bg:           #1a1f1e;
      --bg-card:      #222927;
      --bg-future:    #252e2a;
      --bg-header:    #1e2422;
      --accent:       #4caf7d;
      --accent-dim:   #2d6b4a;
      --text:         #e8f0ec;
      --text-sub:     #8fa898;
      --text-dim:     #5a7066;
      --border:       #2e3d38;
      --encore:       #a0cfb5;
      --tab-h:        60px;
      --sync-h:       28px;
      --footer-h:     90px;
      --header-h:     96px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      height: 100dvh;
      overflow: hidden;
    }

    /* ============ ヘッダー ============ */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding-top: env(safe-area-inset-top);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 48px;
    }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
    }
    .header-counter {
      font-size: 12px;
      color: var(--text-sub);
    }
    .date-jump-btn {
      background: none;
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 6px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ============ メイン ============ */
    .main {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      padding-top: calc(env(safe-area-inset-top) + 48px + 36px);
      padding-bottom: var(--footer-h);
    }
    .page { display: none; width: 100%; height: 100%; }
    .page.active { display: block; }

    /* ============ スワイパー ============ */
    .swiper-outer { width: 100%; height: 100%; overflow: hidden; position: relative; }
    .swiper-track {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }
    .swiper-slide {
      flex-shrink: 0;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .swiper-slide::-webkit-scrollbar { display: none; }

    /* ============ 公演カード ============ */
    .poster-area {
      width: 100%;
      height: 25vh;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: var(--bg-card);
    }
    .poster-area img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 10%; }
    .poster-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--bg-card) 0%, #1e2e28 100%);
    }
    .poster-placeholder-icon { font-size: 36px; opacity: 0.5; }
    .poster-placeholder-name {
      font-size: 16px; font-weight: 700;
      color: var(--accent); opacity: 0.8;
      text-align: center; padding: 0 20px;
    }
    .future-badge {
      position: absolute; top: 10px; right: 10px;
      background: rgba(76,175,125,0.9); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 10px;
    }

    .concert-info {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .concert-date   { font-size: 24px; color: var(--text-sub); margin-bottom: 2px; }
    .concert-artist { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
    .concert-venue  { font-size: 17px; color: var(--accent); }

    .artist-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .artist-tabs::-webkit-scrollbar { display: none; }
    .artist-tab {
      flex-shrink: 0;
      padding: 9px 18px;
      font-size: 13px; font-weight: 600;
      color: var(--text-sub);
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: all 0.2s;
    }
    .artist-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .setlist-area { padding: 14px 16px; }
    .setlist-label {
      font-size: 10px; font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .setlist-track {
      display: flex; align-items: baseline; gap: 10px;
      padding: 5px 0; border-bottom: 1px solid var(--border);
    }
    .setlist-track:last-child { border-bottom: none; }
    .track-num {
      font-size: 14px; color: var(--text-dim);
      min-width: 24px; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .track-name { font-size: 20px; color: var(--text); }
    .track-name.encore { color: var(--encore); }
    .encore-prefix {
      font-size: 12px; font-weight: 700;
      color: var(--accent); margin-right: 3px;
    }
    .no-setlist {
      padding: 30px 16px;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ============ 演者一覧 ============ */
    .artist-list { overflow-y: auto; height: 100%; padding: 12px 16px; }
    .artist-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .artist-item:last-child { border-bottom: none; }
    .artist-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0; overflow: hidden;
    }
    .artist-icon img { width: 100%; height: 100%; object-fit: cover; }
    .artist-info { flex: 1; }
    .artist-item-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .artist-item-sub  { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .artist-item-count {
      font-size: 20px; font-weight: 800;
      color: var(--accent); flex-shrink: 0;
    }

    /* ============ 統計 ============ */
    .stats-page { overflow-y: auto; height: 100%; }
    .stats-year-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .stats-year-label { font-size: 26px; font-weight: 800; color: var(--accent); }
    .stats-year-btn {
      font-size: 22px; color: var(--text-sub);
      background: none; border: none; cursor: pointer; padding: 6px 12px;
    }
    .stats-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .stats-section-title {
      font-size: 11px; font-weight: 700; color: var(--text-dim);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
    }
    .stats-total {
      font-size: 48px; font-weight: 800; color: var(--accent);
      text-align: center; padding: 8px 0;
    }
    .stats-total-label { font-size: 14px; color: var(--text-sub); text-align: center; }
    .stats-rank-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .stats-rank-item:last-child { border-bottom: none; }
    .stats-rank-num {
      font-size: 14px; color: var(--text-dim);
      min-width: 24px; text-align: right;
    }
    .stats-rank-name { flex: 1; font-size: 15px; color: var(--text); }
    .stats-rank-count { font-size: 18px; font-weight: 700; color: var(--accent); }
    .stats-more-btn {
      width: 100%; padding: 10px;
      background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--accent);
      font-size: 13px; cursor: pointer; margin-top: 10px;
    }
    .stats-cache-clear {
      padding: 16px; text-align: center;
    }
    .stats-cache-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-dim);
      font-size: 12px; padding: 8px 20px; cursor: pointer;
    }

    /* ============ ライトボックス ============ */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.95);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .lightbox.active { opacity: 1; pointer-events: all; }
    .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .lightbox-ph { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .lightbox-ph-icon { font-size: 80px; }
    .lightbox-ph-name { font-size: 26px; font-weight: 800; color: var(--accent); text-align: center; padding: 0 20px; }

    /* ============ 修正モーダル ============ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%; background: #1e2e28;
      border-radius: 20px 20px 0 0;
      padding: 16px 20px calc(env(safe-area-inset-bottom) + 20px);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      max-height: 85vh; overflow-y: auto;
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 16px;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
    .modal-item {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;
    }
    .modal-label { font-size: 12px; color: var(--text-sub); }
    .modal-input {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      color: var(--text); font-size: 16px;
      width: 100%;
    }
    .modal-select {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      color: var(--text); font-size: 16px;
      width: 100%;
    }
    .modal-save-btn {
      width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: 10px;
      color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
    }
    .modal-cancel-btn {
      width: 100%; padding: 12px;
      background: none; border: 1px solid var(--border); border-radius: 10px;
      color: var(--text-sub); font-size: 15px;
      cursor: pointer; margin-top: 8px;
    }
    /* セトリ編集モード */
    .edit-setlist-wrapper { padding: 8px 0; }
    .edit-section-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-dim); letter-spacing: 0.05em;
      padding: 10px 0 4px; text-transform: uppercase;
    }
    .edit-song-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid var(--border);
    }
    .edit-song-controls { display: flex; flex-direction: column; gap: 2px; }
    .edit-arrow-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); border-radius: 4px;
      font-size: 12px; width: 28px; height: 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .edit-arrow-btn:disabled { opacity: 0.25; }
    .edit-song-num {
      font-size: 13px; color: var(--text-dim);
      min-width: 20px; text-align: right;
    }
    .edit-song-name {
      flex: 1; font-size: 16px; color: var(--text);
      padding: 4px 0;
    }
    .edit-delete-btn {
      background: none; border: none;
      color: #e57373; font-size: 16px;
      padding: 4px 8px;
    }
    .edit-add-btn {
      width: 100%; margin-top: 12px; padding: 10px;
      background: none; border: 1px dashed var(--border);
      color: var(--accent); border-radius: 8px;
      font-size: 15px;
    }
    .edit-action-buttons {
      display: flex; flex-direction: column; gap: 8px;
      margin-top: 16px;
    }
    .edit-delete-song-btn {
      width: 100%; padding: 12px;
      background: none; border: 1px solid #e57373;
      color: #e57373; border-radius: 8px;
      font-size: 15px; font-weight: 600;
    }
    .modal-display-section {
      padding: 12px 0 8px;
      border-radius: 8px;
    }
    .modal-display-item {
      font-size: 16px;
      color: var(--text);
      padding: 4px 0;
    }
    .modal-perf-name {
      font-size: 13px;
      color: var(--text-dim);
      padding: 4px 0 2px;
    }
    .modal-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }
    .modal-menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; color: var(--text); font-size: 16px;
    }
    .modal-menu-item:last-child { border-bottom: none; }
    .modal-menu-icon { font-size: 20px; }

    /* ============ トースト ============ */
    .toast {
      position: fixed; bottom: calc(var(--footer-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: all 0.3s; pointer-events: none;
      white-space: nowrap; z-index: 2000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ============ フッター ============ */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg-header); border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sync-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 16px; border-bottom: 1px solid var(--border);
      height: var(--sync-h);
    }
    .sync-time { font-size: 11px; color: var(--text-dim); }
    .sync-btn {
      display: flex; align-items: center; gap: 4px;
      background: none; border: 1px solid var(--accent-dim);
      border-radius: 6px; padding: 3px 8px;
      color: var(--accent); font-size: 11px; cursor: pointer;
    }
    .tab-bar { display: flex; height: var(--tab-h); }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; color: var(--text-dim); }
    .tab-item.active .tab-label { color: var(--accent); }

    /* ============ ローディング ============ */
    .loading {
      position: fixed; inset: 0; z-index: 3000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.4s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .loading-icon { font-size: 60px; }
    .loading-title { font-size: 22px; font-weight: 800; color: var(--accent); }
    .loading-msg { font-size: 13px; color: var(--text-sub); }
    .spinner {
      width: 30px; height: 30px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============ オフライン表示 ============ */
    .offline-bar {
      display: none;
      background: #5a3a00; color: #ffcc00;
      font-size: 12px; text-align: center; padding: 5px;
    }
    .offline-bar.show { display: block; }

    /* ============ Ver1.5 新規スタイル ============ */
    /* ポスター写真エリア：長押し誤動作防止 */
    .poster-area {
      -webkit-touch-callout: none;
      user-select: none;
    }
    .poster-area img { pointer-events: none; }

    /* メニューボタン群 */
    .edit-btn-group { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
    .edit-btn {
      width: 100%; padding: 14px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 16px; text-align: left;
      cursor: pointer;
    }
    .edit-btn-primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .edit-btn-danger  { border-color: #e57373; color: #e57373; }
    .modal-section-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 16px; }

    /* 写真プレビュー */
    .preview-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0; max-height: 200px; overflow-y: auto; }
    .preview-img  { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
    .preview-count { text-align: center; color: var(--text-sub); font-size: 13px; padding: 4px 0 8px; }

    /* 補足テキストエリア */
    .edit-textarea {
      width: 100%; box-sizing: border-box;
      background: var(--bg-card); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 14px; resize: vertical; line-height: 1.6;
    }

    /* 原文表示 */
    .original-text-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px;
      font-size: 13px; color: var(--text-sub); word-break: break-all; margin-top: 4px;
    }

    /* ⚠️マーク */
    .unconfirmed-mark { font-size: 14px; cursor: pointer; margin-right: 4px; flex-shrink: 0; }

    /* 全件確認済みボタン */
    .approve-all-btn-area { padding: 12px 16px 4px; text-align: center; }
    .approve-all-btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 14px; font-weight: 700;
      cursor: pointer; width: 100%;
    }
  </style>
</head>
<body>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="loading-icon">🎵</div>
  <div class="loading-title">たろうのLiveViewer</div>
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">データ取得中...</div>
</div>

<!-- オフラインバー -->
<div class="offline-bar" id="offline-bar">
  📴 オフラインです。最終同期データを表示しています
</div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-inner">
    <div class="header-title">🎵 LiveViewer</div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="date-jump-btn" id="date-jump-btn" onclick="openDateJump()">📅</button>
      <div class="header-counter" id="counter"></div>
    </div>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
</div>

<!-- メインコンテンツ -->
<div class="main">

  <!-- 公演一覧ページ -->
  <div class="page active" id="page-concerts">
    <div class="swiper-outer" id="swiper">
      <div class="swiper-track" id="track"></div>
    </div>
  </div>

  <!-- 演者一覧ページ -->
  <div class="page" id="page-artists">
    <div class="artist-list" id="artist-list"></div>
  </div>

  <!-- 統計ページ -->
  <div class="page" id="page-stats">
    <div class="stats-page" id="stats-content"></div>
  </div>

</div>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div id="lb-content"></div>
</div>

<!-- 修正モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- フッター -->
<div class="footer">
  <div class="sync-bar">
    <div class="sync-time" id="sync-time">同期中...</div>
  </div>
  <div class="tab-bar">
    <div class="tab-item active" id="tab-concerts" onclick="switchTab('concerts')">
      <div class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="8" cy="18" rx="4" ry="3" fill="#ffe082"/>
          <ellipse cx="18" cy="15" rx="3" ry="2.5" fill="#ffe082"/>
          <rect x="11.5" y="4" width="2" height="14" rx="1" fill="#ffe082"/>
          <rect x="11.5" y="4" width="9" height="2" rx="1" fill="#ffe082"/>
        </svg>
      </div>
      <div class="tab-label">公演一覧</div>
    </div>
    <div class="tab-item" id="tab-artists" onclick="switchTab('artists')">
      <div class="tab-icon">👤</div>
      <div class="tab-label">演者一覧</div>
    </div>
    <div class="tab-item" id="tab-stats" onclick="switchTab('stats')">
      <div class="tab-icon">📊</div>
      <div class="tab-label">統計</div>
    </div>
    <div class="tab-item" onclick="doSync()">
      <div class="tab-icon">🔄</div>
      <div class="tab-label">更新</div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // 設定
  // ============================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwVPjE1NTYWv6FWYOXovTWg9iCAP4CXx7QeDLVrg9aT8-HBoqEBkzIeDcIo7-H29cuOWQ/exec'; // ← GAS WebApp URLをここに設定

  // ============================================================
  // 状態管理
  // ============================================================
  let state = {
    concerts:           [],
    filteredConcerts:   [],
    concertsByYear:     {},
    years:              [],
    currentFilterYear:  String(new Date().getFullYear()),
    artists:            [],
    currentIdx:         0,
    currentTab:         'concerts',
    currentYear:        new Date().getFullYear(),
    statsData:          null,
    filters:            { artist: null, year: null, prefecture: null },
    isOffline:          false,
    syncTime:           '',
    setlistCache:       {},
    artistImages:       {},
    editMode:           false,
  };

  // ============================================================
  // API（ブラウザ側メモリキャッシュ付き）
  // ============================================================
  const apiCache    = {};  // メモリキャッシュ
  const apiFetching = {};  // 取得中フラグ（二重リクエスト防止）

  async function apiGet(action, params = {}) {
    // キャッシュキーを生成
    const cacheKey = action + '_' + JSON.stringify(params);

    // メモリキャッシュヒット → 即返す
    if (apiCache[cacheKey]) {
      return apiCache[cacheKey];
    }

    // 取得中の場合は完了を待つ
    if (apiFetching[cacheKey]) {
      await new Promise(resolve => {
        const check = setInterval(() => {
          if (!apiFetching[cacheKey]) { clearInterval(check); resolve(); }
        }, 100);
      });
      return apiCache[cacheKey];
    }

    apiFetching[cacheKey] = true;

    try {
      const url = new URL(GAS_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

      const res  = await fetch(url.toString());
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'APIエラー');

      // メモリキャッシュに保存
      apiCache[cacheKey] = data.data;
      return data.data;

    } catch(e) {
      if (!navigator.onLine) {
        state.isOffline = true;
        document.getElementById('offline-bar').classList.add('show');
        const cached = localStorage.getItem('lv_' + action);
        if (cached) return JSON.parse(cached);
      }
      throw e;
    } finally {
      apiFetching[cacheKey] = false;
    }
  }

  // メモリキャッシュをクリア（更新ボタン・修正後に使用）
  function clearApiCache() {
    Object.keys(apiCache).forEach(k => delete apiCache[k]);
  }

  async function apiPost(action, body = {}) {
    const res  = await fetch(GAS_URL, {
      method: 'POST',
      body:   JSON.stringify({ action, ...body })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'APIエラー');
    return data.data;
  }

  // ============================================================
  // 初期化
  // ============================================================
  window.addEventListener('load', async () => {
    // Service Worker登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('liveviewer_sw.js').catch(() => {});
    }

    try {
      // 【Ver1.5】localStorageにデータが残っていれば即時表示（起動高速化）
      const thisYear   = String(new Date().getFullYear());
      const lsYears    = localStorage.getItem('lv_years');
      const lsArtists  = localStorage.getItem('lv_artists');
      const lsConcerts = localStorage.getItem('lv_concerts_' + thisYear);

      if (lsYears && lsArtists && lsConcerts) {
        state.years                    = JSON.parse(lsYears);
        state.currentFilterYear        = thisYear;
        state.artists                  = JSON.parse(lsArtists);
        state.concertsByYear[thisYear] = JSON.parse(lsConcerts);
        state.concerts                 = JSON.parse(lsConcerts);

        await _loadArtistImages();
        renderConcerts();
        renderFilters();
        renderArtists();

        const today = new Date().toISOString().slice(0, 10);
        goTo(_findNearestIdx(state.filteredConcerts, today));

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('sync-time').textContent = 'キャッシュ表示中（🔄で更新）';
        return;
      }

      // localStorageが空の場合は従来通りAPIから取得
      document.getElementById('loading-msg').textContent = '年一覧取得中...';
      const years = await apiGet('years');
      state.years      = years;
      state.currentFilterYear = thisYear;

      document.getElementById('loading-msg').textContent = '公演データ取得中...';
      const [concerts, artists] = await Promise.all([
        apiGet('concerts', { year: state.currentFilterYear }),
        apiGet('artists'),
      ]);

      localStorage.setItem('lv_concerts_' + state.currentFilterYear, JSON.stringify(concerts));
      localStorage.setItem('lv_artists', JSON.stringify(artists));
      localStorage.setItem('lv_years',   JSON.stringify(years));

      state.concertsByYear[state.currentFilterYear] = concerts;
      state.concerts = concerts;
      state.artists  = artists;

      document.getElementById('loading-msg').textContent = 'アーティスト画像取得中...';
      await _loadArtistImages();
      state.syncTime = new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      document.getElementById('sync-time').textContent = '最終同期: ' + state.syncTime;

      renderConcerts();
      renderFilters();
      renderArtists();

      const today = new Date().toISOString().slice(0, 10);
      goTo(_findNearestIdx(state.filteredConcerts, today));

    } catch(e) {
      document.getElementById('loading-msg').textContent = 'エラー: ' + e.message;
      return;
    }

    document.getElementById('loading').classList.add('hidden');
  });

  // ============================================================
  // 公演一覧レンダリング
  // ============================================================
  function renderConcerts() {
    state.filteredConcerts = filterConcerts(state.concerts);
    const track = document.getElementById('track');
    track.innerHTML = '';

    state.filteredConcerts.forEach((c, i) => {
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
      slide.innerHTML = buildConcertCard(c, i);
      track.appendChild(slide);
    });

    document.getElementById('counter').textContent =
      state.filteredConcerts.length > 0
        ? `${state.currentIdx + 1} / ${state.filteredConcerts.length}`
        : '0 / 0';
  }

  function buildConcertCard(c, idx) {
    // ポスター写真 → デフォルト画像（Base64・永続）→ プレースホルダーの優先順位
    const artistId      = c.artists.length > 0 ? c.artists[0].id : '';
    const defaultImgB64 = artistId && state.artistImages[artistId]
      ? state.artistImages[artistId].base64 : '';
    const posterHtml = c.has_poster && c.poster_url
      ? `<img src="${c.poster_url}" alt="ポスター" loading="lazy">`
      : defaultImgB64
        ? `<img src="${defaultImgB64}" alt="${esc(c.artists.map(a => a.name).join(' / '))}" loading="lazy">`
        : `<div class="poster-placeholder">
             <div class="poster-placeholder-icon">🎸</div>
             <div class="poster-placeholder-name">${esc(c.artists.map(a => a.name).join(' / '))}</div>
           </div>`;

    const futureBadge = c.is_future ? `<div class="future-badge">📅 予定</div>` : '';
    const artistLabel = c.artists.map(a => a.name).join(' / ');
    const venueLabel  = c.venue ? c.venue.name : '';
    const dayNight    = c.day_night ? `　${c.day_night}` : '';

    return `
      <div class="concert-card" style="${c.is_future ? 'background:var(--bg-future)' : ''}">
        <div class="poster-area" onclick="openLightbox(${idx})">
          ${posterHtml}
          ${futureBadge}
        </div>
        <div class="concert-info">
          <div class="concert-date">${esc(c.date_label)}${esc(dayNight)}</div>
          <div class="concert-artist">${esc(artistLabel)}</div>
          <div class="concert-venue">${esc(venueLabel)}</div>
        </div>
        <div class="setlist-area" id="setlist-${idx}">
          <div class="no-setlist">セットリスト読み込み中...</div>
        </div>
      </div>
    `;
  }

  // ============================================================
  // セットリスト遅延読み込み
  // ============================================================
  const loadingSetlists = new Set(); // 取得中のIDを管理（二重取得防止）

  async function loadSetlist(idx) {
    const c = state.filteredConcerts[idx];
    if (!c) return;

    // ③ メモリキャッシュヒット → 即表示
    if (state.setlistCache[c.id]) {
      renderSetlist(idx, state.setlistCache[c.id]);
      return;
    }

    // ③ localStorageキャッシュヒット → 即表示してバックグラウンドで更新
    const lsKey    = 'lv_setlist_' + c.id;
    const lsCached = localStorage.getItem(lsKey);
    if (lsCached) {
      const parsed = JSON.parse(lsCached);
      state.setlistCache[c.id] = parsed;
      renderSetlist(idx, parsed);
      return; // キャッシュから即表示して終了
    }

    if (loadingSetlists.has(c.id)) return; // 取得中はスキップ
    loadingSetlists.add(c.id);

    try {
      const data = await fetch(GAS_URL + '?action=setlist&liveId=' + encodeURIComponent(c.id))
        .then(r => r.json())
        .then(r => { if (!r.success) throw new Error(r.error); return r.data; });

      // ③ メモリ・localStorageの両方に保存
      state.setlistCache[c.id] = data;
      try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch(e) {}
      renderSetlist(idx, data);

    } catch(e) {
      const el = document.getElementById('setlist-' + idx);
      if (el) el.innerHTML = '<div class="no-setlist">セットリストなし</div>';
    } finally {
      loadingSetlists.delete(c.id);
    }
  }

  // ④ バックグラウンドプリフェッチ（前後3件を事前取得）
  function prefetchAround(idx) {
    [-3, -2, -1, 1, 2, 3].forEach(offset => {
      const target = state.filteredConcerts[idx + offset];
      if (!target) return;
      if (state.setlistCache[target.id]) return;
      if (loadingSetlists.has(target.id)) return;
      if (localStorage.getItem('lv_setlist_' + target.id)) return;
      // バックグラウンドで取得（結果は待たない）
      loadSetlist(idx + offset);
    });
  }

  function renderSetlist(idx, data) {
    const el = document.getElementById('setlist-' + idx);
    if (!el) return;

    const c        = state.filteredConcerts[idx];
    const setlists = data ? (data.setlists || []) : [];
    const artists  = c ? (c.artists || []) : [];

    // 【Ver1.5】セトリ未入力でも複数アーティストの場合はタブを表示
    if (!setlists || setlists.length === 0) {
      if (artists.length > 1) {
        const tabs = artists.map((a, i) =>
          `<div class="artist-tab ${i === 0 ? 'active' : ''}"
                onclick="switchArtistTab(this)">${esc(a.name)}</div>`
        ).join('');
        el.innerHTML = `
          <div class="artist-tabs">${tabs}</div>
          <div class="no-setlist">セットリストなし</div>
        `;
      } else {
        el.innerHTML = '<div class="no-setlist">セットリストなし</div>';
      }
      return;
    }

    // 対バン（複数セットリスト）の場合はタブ
    if (setlists.length > 1) {
      const tabs = setlists.map((sl, i) =>
        `<div class="artist-tab ${i === 0 ? 'active' : ''}"
              data-setlist-id="${sl.id}"
              onclick="switchSetlistTab(${idx}, ${i}, this)">${esc(sl.artist_name)}</div>`
      ).join('');

      const panes = setlists.map((sl, i) =>
        `<div class="setlist-pane" id="pane-${idx}-${i}" style="${i > 0 ? 'display:none' : ''}">
           ${buildSongList(sl.songs, sl.id, c ? c.id : '')}
         </div>`
      ).join('');

      el.innerHTML = `
        <div class="artist-tabs">${tabs}</div>
        ${panes}
      `;
    } else {
      el.innerHTML = buildSongList(setlists[0].songs, setlists[0].id, c ? c.id : '');
    }
  }

  // 【Ver1.5】セトリ未入力時のアーティストタブ切り替え（セトリなし表示のまま）
  function switchArtistTab(el) {
    const tabs = el.closest('.artist-tabs').querySelectorAll('.artist-tab');
    tabs.forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function buildSongList(songs, setlistId, liveId) {
    if (!songs || songs.length === 0) {
      return '<div class="no-setlist">曲目なし</div>';
    }

    let html = '<div class="setlist-label">Setlist</div>';
    let trackCounter = 0;
    let hasUnconfirmed = false;

    songs.forEach(s => {
      if (!s.is_encore) trackCounter++;
      const numLabel   = s.track !== null ? s.track : (s.is_encore ? '—' : trackCounter);
      const encoreHtml = s.is_encore ? `<span class="encore-prefix">EN.</span>` : '';
      const cls        = s.is_encore ? 'track-name encore' : 'track-name';

      // 【Ver1.5】未確認フラグONの曲に⚠️マークを表示
      if (s.unconfirmed) hasUnconfirmed = true;
      const warningHtml = s.unconfirmed
        ? `<span class="unconfirmed-mark" onclick="openApproveSongModal('${s.id}','${esc(s.song_name)}','${esc(s.rank||'')}','${esc(s.original_text||'')}',event)">⚠️</span>`
        : '';

      html += `
        <div class="setlist-track">
          <span class="track-num">${numLabel}</span>
          ${warningHtml}
          <span class="${cls}" onclick="openSongEditModal('${s.id}','${esc(s.song_name)}',${s.encore_count||0})">${encoreHtml}${esc(s.song_name)}</span>
        </div>
      `;
    });

    // 【Ver1.5】未確認フラグONの曲がある場合は「全て確認済みにする」ボタンを表示
    if (hasUnconfirmed && setlistId) {
      html += `
        <div class="approve-all-btn-area">
          <button class="approve-all-btn" onclick="approveAll('${setlistId}','${liveId||''}')">
            ✅ 全て確認済みにする
          </button>
        </div>
      `;
    }

    return html;
  }

  function switchSetlistTab(cardIdx, tabIdx, el) {
    const tabs = el.closest('.artist-tabs').querySelectorAll('.artist-tab');
    tabs.forEach(t => t.classList.remove('active'));
    el.classList.add('active');

    const panes = document.querySelectorAll(`[id^="pane-${cardIdx}-"]`);
    panes.forEach((p, i) => p.style.display = i === tabIdx ? 'block' : 'none');
  }

  // ============================================================
  // iOSスワイプ戻る/進むジェスチャーを無効化
  // ============================================================
  document.addEventListener('touchstart', (e) => {
    const x = e.touches[0].pageX;
    if (x <= 20 || x >= window.innerWidth - 20) {
      e.preventDefault();
    }
  }, { passive: false });

  // ブラウザ履歴を固定（popstateによるリロード防止）
  history.replaceState(null, '', location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', location.href);
  });

  // ============================================================
  // スワイパー
  // ============================================================
  let touchStartX = 0, touchStartY = 0;

  const swiper = document.getElementById('swiper');
  swiper.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  swiper.addEventListener('touchend', e => {
    if (state.editMode) return; // 編集モード中はスワイプ無効
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      closeLightbox();
      if (dx < 0) goTo(state.currentIdx + 1);
      else        goTo(state.currentIdx - 1);
    }
  }, { passive: true });

  function goTo(idx) {
    if (idx < 0 || idx >= state.filteredConcerts.length) return;
    state.currentIdx = idx;
    document.getElementById('track').style.transform = `translateX(-${idx * 100}%)`;
    document.getElementById('counter').textContent = `${idx + 1} / ${state.filteredConcerts.length}`;
    loadSetlist(idx);
    // ④ 前後3件をバックグラウンドでプリフェッチ
    prefetchAround(idx);
  }

  // ============================================================
  // フィルター
  // ============================================================
  function renderFilters() {
    const bar      = document.getElementById('filter-bar');
    const years    = state.years.length > 0 ? state.years : [...new Set(state.concerts.map(c => c.date ? c.date.slice(0, 4) : '').filter(Boolean))].sort().reverse();
    let html = `<div class="filter-chip active" onclick="applyFilter('all', null, this)">すべて</div>`;
    years.forEach(y => html += `<div class="filter-chip" onclick="applyFilter('year', '${y}', this)">${y}年</div>`);

    bar.innerHTML = html;
  }

  async function applyFilter(type, value, el) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');

    if (type === 'all') {
      state.filters = { artist: null, year: null, prefecture: null };
      state.currentFilterYear = String(new Date().getFullYear());
      state.concerts = state.concertsByYear[state.currentFilterYear] || [];
    } else if (type === 'year') {
      state.filters.year      = value;
      state.currentFilterYear = value;

      // 未取得の年はAPIから取得
      if (!state.concertsByYear[value]) {
        showToast('⏳ ' + value + '年のデータを取得中...');
        try {
          const data = await apiGet('concerts', { year: value });
          state.concertsByYear[value] = data;
          localStorage.setItem('lv_concerts_' + value, JSON.stringify(data));
        } catch(e) {
          showToast('❌ データ取得失敗: ' + e.message);
          return;
        }
      }
      state.concerts = state.concertsByYear[value];
    } else if (type === 'pref') {
      state.filters.prefecture = value;
    } else if (type === 'artist') {
      state.filters.artist = value;
    }

    state.setlistCache = {};
    renderConcerts();

    // フィルター別の初期表示位置
    const today = new Date().toISOString().slice(0, 10);
    if (type === 'all' || type === 'artist') {
      // すべて・アーティスト → 本日に最も近い公演
      goTo(_findNearestIdx(state.filteredConcerts, today));
    } else if (type === 'year') {
      const currentYear = new Date().getFullYear();
      const selectedYear = parseInt(value);
      if (selectedYear < currentYear) {
        // 過去年 → その年の最初の公演（先頭）
        goTo(0);
      } else if (selectedYear > currentYear) {
        // 未来年 → その年の最初の公演（先頭）
        goTo(0);
      } else {
        // 当年 → 本日に最も近い公演
        goTo(_findNearestIdx(state.filteredConcerts, today));
      }
    } else {
      goTo(0);
    }
  }

  function filterConcerts(concerts) {
    return concerts.filter(c => {
      if (state.filters.year && (!c.date || !c.date.startsWith(state.filters.year))) return false;
      if (state.filters.prefecture && c.prefecture !== state.filters.prefecture) return false;
      if (state.filters.artist && !c.artists.some(a => a.name === state.filters.artist)) return false;
      return true;
    });
  }

  // ============================================================
  // ライトボックス
  // ============================================================
  function openLightbox(idx) {
    const c   = state.filteredConcerts[idx];
    const lb  = document.getElementById('lightbox');
    const cnt = document.getElementById('lb-content');

    const artistId2     = c.artists.length > 0 ? c.artists[0].id : '';
    const defaultImgLb  = artistId2 && state.artistImages[artistId2]
      ? state.artistImages[artistId2].base64 : '';
    if (c.has_poster && c.poster_url) {
      cnt.innerHTML = `<img src="${c.poster_url}" alt="ポスター">`;
    } else if (defaultImgLb) {
      cnt.innerHTML = `<img src="${defaultImgLb}" alt="${esc(c.artists.map(a => a.name).join(' / '))}">`;
    } else {
      cnt.innerHTML = `
        <div class="lightbox-ph">
          <div class="lightbox-ph-icon">🎸</div>
          <div class="lightbox-ph-name">${esc(c.artists.map(a => a.name).join(' / '))}</div>
        </div>`;
    }

    lb.classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }

  // ============================================================
  // 修正モーダル（長押し検知）【Ver1.5更新】
  // ============================================================
  let longPressTimer = null;

  document.addEventListener('touchstart', e => {
    if (e.target.closest('.poster-area')) {
      longPressTimer = setTimeout(() => {
        _modalJustOpened = true;
        setTimeout(() => { _modalJustOpened = false; }, 600);
        openPosterMenu();
      }, 600);
    } else if (e.target.closest('.concert-info')) {
      longPressTimer = setTimeout(() => {
        _modalJustOpened = true;
        setTimeout(() => { _modalJustOpened = false; }, 600);
        openEditConcert();
      }, 600);
    } else if (e.target.closest('.setlist-area')) {
      longPressTimer = setTimeout(() => {
        _modalJustOpened = true;
        setTimeout(() => { _modalJustOpened = false; }, 600);
        openSetlistMenu();
      }, 600);
    }
  }, { passive: true });

  // 指が離れたらタイマーキャンセル
  document.addEventListener('touchend', () => {
    clearTimeout(longPressTimer);
  });

  // 指が動いたらタイマーキャンセル（スクロール中の誤発火防止）
  document.addEventListener('touchmove', () => {
    clearTimeout(longPressTimer);
  }, { passive: true });

  // ============================================================
  // 【Ver1.5新規】ポスター写真メニュー
  // ============================================================
  function openPosterMenu() {
    alert('openPosterMenu called'); // 【診断用・確認後削除】

    closeModal();
    try {

      await apiPost('lv_analyze', { setlistId, userId: null });

  }

  // 解析完了ポーリング（5秒間隔・最大60回＝5分でタイムアウト）
  let _pollingTimer = null;
  function _startAnalysisPolling(setlistId) {
    if (_pollingTimer) clearInterval(_pollingTimer);
    let attempts = 0;
    _pollingTimer = setInterval(async () => {
      attempts++;
      if (attempts > 60) {
        clearInterval(_pollingTimer); _pollingTimer = null;
        showToast('⚠️ 解析に時間がかかっています。後ほど更新ボタンで確認してください。');
        return;
      }
      try {
        const result = await apiGet('lv_analysis_status', { setlistId });
        if (result && result.is_complete) {
          clearInterval(_pollingTimer); _pollingTimer = null;
          const c = state.filteredConcerts[state.currentIdx];
          if (c) {
            delete state.setlistCache[c.id];
            localStorage.removeItem('lv_setlist_' + c.id);
            await loadSetlist(state.currentIdx);
          }
          showToast('✅ 解析完了！セトリを確認してください。');
        }
      } catch(e) {}
    }, 5000);
  }

  // ファイルをbase64に変換
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('ファイル読み込み失敗'));
      reader.readAsDataURL(file);
    });
  }

    const c    = state.filteredConcerts[state.currentIdx];
    const year = c.date ? c.date.slice(0, 4) : '';
    const body = {
      liveId: c.id,
      year:   year,
      format: document.getElementById('edit-format').value,
      memo:   document.getElementById('edit-memo').value,
    };

    try {
      await apiPost('edit_concert', body);
      closeModal();

      // 該当年のキャッシュのみクリア
      clearApiCache();
      if (year) localStorage.removeItem('lv_concerts_' + year);
      delete state.concertsByYear[year];

      // 該当年の公演を再取得
      const res = await apiGet('concerts', { year });
      state.concertsByYear[year] = res;
      state.concerts = res;
      if (year) localStorage.setItem('lv_concerts_' + year, JSON.stringify(res));

      // filteredConcertsを更新（フィルター条件を維持）
      state.filteredConcerts = filterConcerts(state.concerts);

      // 現在のカードのみ再描画（currentIdxはそのまま）
      const newC  = state.filteredConcerts[state.currentIdx];
      const slide = document.getElementById('track').children[state.currentIdx];
      if (slide && newC) {
        slide.innerHTML = buildConcertCard(newC, state.currentIdx);
        loadSetlist(state.currentIdx);

      showToast('❌ 保存失敗: ' + e.message);

  // ============================================================
  // セットリスト編集モード【Ver1.4全面実装】
  // ============================================================

  // 編集モードの状態
  const editSetlistState = {
    active:       false,
    liveId:       null,
    setlistId:    null,
    songs:        [],        // 編集中の曲配列（ローカル）
    originalSongs: [],       // 元の曲配列（キャンセル用）
    paneEl:       null,      // 編集対象のpane要素
  };

  function openEditSetlist() {
    const c = state.filteredConcerts[state.currentIdx];
    if (!c) return;

    const cached = state.setlistCache && state.setlistCache[c.id];
    if (!cached || !cached.setlists || cached.setlists.length === 0) {
      showToast('セットリストが読み込まれていません');
      return;
    }

    // 対バンは現在表示中のセットリストペインを特定
    const idx      = state.currentIdx;
    const setlists = cached.setlists;
    let   activeSlIdx = 0;

    if (setlists.length > 1) {
      // アクティブなタブのインデックスを取得
      const tabs = document.querySelectorAll(`#setlist-${idx} .artist-tab`);
      tabs.forEach((t, i) => { if (t.classList.contains('active')) activeSlIdx = i; });
    }

    const sl    = setlists[activeSlIdx];
    const paneId = setlists.length > 1
      ? `pane-${idx}-${activeSlIdx}`
      : `setlist-${idx}`;
    const paneEl = document.getElementById(paneId);

    // 状態を設定
    editSetlistState.active        = true;
    editSetlistState.liveId        = c.id;
    editSetlistState.setlistId     = sl.id;
    editSetlistState.songs         = sl.songs.map(s => ({ ...s, original_track: s.track }));
    editSetlistState.originalSongs = sl.songs.map(s => ({ ...s }));
    editSetlistState.paneEl        = paneEl;

    // スワイプロック
    state.editMode = true;

    renderEditSetlist();
  }

  function renderEditSetlist() {
    const el    = editSetlistState.paneEl;
    const songs = editSetlistState.songs;
    if (!el) return;

    // セクション分け（本編・アンコール1・アンコール2）
    const mainSongs    = songs.filter(s => s.encore_count === 0);
    const encore1Songs = songs.filter(s => s.encore_count === 1);
    const encore2Songs = songs.filter(s => s.encore_count === 2);

    const buildRows = (sectionSongs, globalStart) => {
      return sectionSongs.map((s, localIdx) => {
        const globalIdx = songs.indexOf(s);
        const isFirst   = globalIdx === 0 || songs.slice(0, globalIdx).every(x => x.encore_count !== s.encore_count);
        const isLast    = globalIdx === songs.length - 1 || songs.slice(globalIdx + 1).every(x => x.encore_count !== s.encore_count);
        const upDisabled   = isFirst  ? 'disabled' : '';
        const downDisabled = isLast   ? 'disabled' : '';

        return `
          <div class="edit-song-row" data-idx="${globalIdx}">
            <div class="edit-song-controls">
              <button class="edit-arrow-btn" ${upDisabled} onclick="moveSong(${globalIdx}, -1)">↑</button>
              <button class="edit-arrow-btn" ${downDisabled} onclick="moveSong(${globalIdx}, 1)">↓</button>
            </div>
            <span class="edit-song-num">${s.track !== null ? s.track : '—'}</span>
            <span class="edit-song-name" onclick="openSongEdit(${globalIdx})">${esc(s.song_name)}</span>
            <button class="edit-delete-btn" onclick="deleteSong(${globalIdx})">✕</button>
          </div>
        `;
      }).join('');
    };

    let html = '<div class="edit-setlist-wrapper">';

    if (mainSongs.length > 0) {
      html += `<div class="edit-section-label">本編</div>`;
      html += buildRows(mainSongs);
    }
    if (encore1Songs.length > 0) {
      html += `<div class="edit-section-label">アンコール 1</div>`;
      html += buildRows(encore1Songs);
    }
    if (encore2Songs.length > 0) {
      html += `<div class="edit-section-label">アンコール 2</div>`;
      html += buildRows(encore2Songs);
    }

    html += `
      <button class="edit-add-btn" onclick="openAddSong()">＋ 曲を追加</button>
      <div class="edit-action-buttons">
        <button class="modal-save-btn" onclick="saveSetlistOrder()">保存する</button>
        <button class="modal-cancel-btn" onclick="cancelEditSetlist()">キャンセル</button>
      </div>
    </div>`;

    el.innerHTML = html;
  }

  // 曲を上下に移動（同セクション内のみ）
  function moveSong(idx, dir) {
    const songs   = editSetlistState.songs;
    const target  = songs[idx];
    const swapIdx = idx + dir;
    if (swapIdx < 0 || swapIdx >= songs.length) return;
    if (songs[swapIdx].encore_count !== target.encore_count) return; // セクション越え不可

    // 配列内の位置を入れ替え
    [songs[idx], songs[swapIdx]] = [songs[swapIdx], songs[idx]];

    // track番号を振り直す（セクション別に1から採番）
    renumberTracks();
    renderEditSetlist();
  }

  // track番号を振り直す（本編・アンコール1・アンコール2 それぞれ1から）
  function renumberTracks() {
    const songs    = editSetlistState.songs;
    const counters = { 0: 0, 1: 0, 2: 0 };
    songs.forEach(s => {
      counters[s.encore_count] = (counters[s.encore_count] || 0) + 1;
      s.track = counters[s.encore_count];
    });
  }

  // 1曲編集モーダル（セトリ編集モード内のタップ）
  function openSongEdit(idx) {
    const s = editSetlistState.songs[idx];
    if (!s) return;

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-title">✏️ 曲を編集</div>
      <div class="modal-item">
        <div class="modal-label">曲名</div>
        <input class="modal-input" type="text" id="song-edit-name" value="${esc(s.song_name)}">
      </div>
      <div class="modal-item">
        <div class="modal-label">アンコール区分</div>
        <select class="modal-select" id="song-edit-encore">
          <option value="0" ${s.encore_count === 0 ? 'selected' : ''}>本編</option>
          <option value="1" ${s.encore_count === 1 ? 'selected' : ''}>アンコール 1</option>
          <option value="2" ${s.encore_count === 2 ? 'selected' : ''}>アンコール 2</option>
        </select>
      </div>
      <button class="modal-save-btn" onclick="saveSongEdit(${idx})">保存する</button>
      <button class="edit-delete-song-btn" onclick="deleteSong(${idx}, true)">この曲を削除</button>
      <button class="modal-cancel-btn" onclick="closeModal()">キャンセル</button>
    `;
    openModal();
  }

  async function saveSongEdit(idx) {
    const s        = editSetlistState.songs[idx];
    const songName = document.getElementById('song-edit-name').value.trim();
    const encore   = parseInt(document.getElementById('song-edit-encore').value, 10);

    if (!songName) { showToast('曲名を入力してください'); return; }

    try {
      await apiPost('edit_setlist', {
        edit_type:    'edit_song',
        liveId:       editSetlistState.liveId,
        setlistId:    editSetlistState.setlistId,
        song_id:      s.id,
        song_name:    songName,
        encore_count: encore,
      });

      // ローカルを更新
      s.song_name    = songName;
      s.encore_count = encore;
      s.is_encore    = encore > 0;
      closeModal();
      renumberTracks();
      renderEditSetlist();

      // 【修正】セットリストキャッシュをクリア（編集モードを抜けた後に古い表示が残る不具合対策）
      if (state.setlistCache) delete state.setlistCache[editSetlistState.liveId];
      localStorage.removeItem('lv_setlist_' + editSetlistState.liveId);
    } catch(e) {
      showToast('❌ 保存失敗: ' + e.message);
    }
  }

  // 曲の削除
  async function deleteSong(idx, fromModal = false) {
    const s = editSetlistState.songs[idx];
    if (!s) return;

    try {
      await apiPost('edit_setlist', {
        edit_type: 'delete_song',
        liveId:    editSetlistState.liveId,
        setlistId: editSetlistState.setlistId,
        song_id:   s.id,
      });

      // ローカル配列から除去
      editSetlistState.songs.splice(idx, 1);
      renumberTracks();
      if (fromModal) closeModal();
      renderEditSetlist();
      showToast('🗑️ 削除しました');

      // 【修正】セットリストキャッシュをクリア（編集モードを抜けた後に削除前の表示が残る不具合対策）
      if (state.setlistCache) delete state.setlistCache[editSetlistState.liveId];
      localStorage.removeItem('lv_setlist_' + editSetlistState.liveId);
    } catch(e) {
      showToast('❌ 削除失敗: ' + e.message);
    }
  }

  // 曲の追加
  function openAddSong() {
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-title">＋ 曲を追加</div>
      <div class="modal-item">
        <div class="modal-label">曲名</div>
        <input class="modal-input" type="text" id="add-song-name" placeholder="曲名を入力">
      </div>
      <div class="modal-item">
        <div class="modal-label">アンコール区分</div>
        <select class="modal-select" id="add-song-encore">
          <option value="0">本編</option>
          <option value="1">アンコール 1</option>
          <option value="2">アンコール 2</option>
        </select>
      </div>
      <button class="modal-save-btn" onclick="addSong()">追加する</button>
      <button class="modal-cancel-btn" onclick="closeModal()">キャンセル</button>
    `;
    openModal();
  }

  async function addSong() {
    const songName = document.getElementById('add-song-name').value.trim();
    const encore   = parseInt(document.getElementById('add-song-encore').value, 10);

    if (!songName) { showToast('曲名を入力してください'); return; }

    // 該当アンコール区分の末尾のtrack番号を計算
    const sameSection = editSetlistState.songs.filter(s => s.encore_count === encore);
    const nextTrack   = sameSection.length + 1;

    try {
      const res = await apiPost('edit_setlist', {
        edit_type:    'add_song',
        liveId:       editSetlistState.liveId,
        setlistId:    editSetlistState.setlistId,
        song_name:    songName,
        track:        nextTrack,
        encore_count: encore,
      });

      // ローカルに追加
      editSetlistState.songs.push({
        id:             res && res.song_id ? res.song_id : 'temp_' + Date.now(),
        song_name:      songName,
        track:          nextTrack,
        encore_count:   encore,
        is_encore:      encore > 0,
        original_track: null,
        rank:           'A',
        unconfirmed:    true,
      });

      closeModal();
      renumberTracks();
      renderEditSetlist();
      showToast('✅ 追加しました');

      // 【修正】セットリストキャッシュをクリア（編集モードを抜けた後に追加前の表示が残る不具合対策）
      if (state.setlistCache) delete state.setlistCache[editSetlistState.liveId];
      localStorage.removeItem('lv_setlist_' + editSetlistState.liveId);
    } catch(e) {
      showToast('❌ 追加失敗: ' + e.message);
    }
  }

  // 並び替えを保存（差分のみ送信）
  async function saveSetlistOrder() {
    const songs       = editSetlistState.songs;
    const changedSongs = songs
      .filter(s => s.track !== s.original_track)
      .filter(s => !String(s.id).startsWith('temp_')) // 【保険】temp_IDはスキップ
      .map(s => ({ song_id: s.id, track: s.track, original_track: s.original_track }));

    try {
      if (changedSongs.length > 0) {
        await apiPost('edit_setlist', {
          edit_type: 'reorder_songs',
          liveId:    editSetlistState.liveId,
          setlistId: editSetlistState.setlistId,
          songs:     changedSongs,
        });
      }

      // キャッシュクリア
      if (state.setlistCache) delete state.setlistCache[editSetlistState.liveId];
      localStorage.removeItem('lv_setlist_' + editSetlistState.liveId);

      exitEditSetlist();
      // セットリストを再読み込み
      loadSetlist(state.currentIdx);
      showToast('✅ 保存しました');
    } catch(e) {
      showToast('❌ 保存失敗: ' + e.message);
    }
  }

  // キャンセル（変更破棄）
  function cancelEditSetlist() {
    exitEditSetlist();
    // 元のセットリストを再描画
    loadSetlist(state.currentIdx);
  }

  function exitEditSetlist() {
    state.editMode                = false;
    editSetlistState.active       = false;
    editSetlistState.liveId       = null;
    editSetlistState.setlistId    = null;
    editSetlistState.songs        = [];
    editSetlistState.originalSongs = [];
    editSetlistState.paneEl       = null;
  }

  function openModal() {
    document.getElementById('modal-overlay').classList.add('active');
  }

  // 【Ver1.5】長押し後のclickイベントによる即時クローズを防ぐフラグ
  let _modalJustOpened = false;

  function closeModal(e) {
    if (_modalJustOpened) return; // 長押し直後のclickは無視
    if (e && e.target !== document.getElementById('modal-overlay')) return;
    document.getElementById('modal-overlay').classList.remove('active');
  }

  // ============================================================
  // 演者一覧
  // ============================================================
  function renderArtists() {
    const list = document.getElementById('artist-list');
    list.innerHTML = state.artists.map(a => `
      <div class="artist-item" onclick="goToArtist('${a.id}')">
        <div class="artist-icon">
          ${a.default_img_url
            ? `<img src="${a.default_img_url}" alt="${esc(a.name)}">`
            : '👤'}
        </div>
        <div class="artist-info">
          <div class="artist-item-name">${esc(a.name)}</div>
          <div class="artist-item-sub">${a.concert_count}本 / ${a.song_count}曲</div>
        </div>
        <div class="artist-item-count">${a.concert_count}</div>
      </div>
    `).join('');
  }

  function goToArtist(artistId) {
    // 公演一覧をそのアーティストでフィルタリング
    const artist = state.artists.find(a => a.id === artistId);
    if (!artist) return;

    switchTab('concerts');
    const chip = [...document.querySelectorAll('.filter-chip')]
      .find(c => c.textContent === artist.name);
    if (chip) {
      applyFilter('artist', artist.name, chip);
    }
  }

  // ============================================================
  // 統計
  // ============================================================
  async function renderStats() {
    const content = document.getElementById('stats-content');
    content.innerHTML = `
      <div class="stats-year-nav">
        <button class="stats-year-btn" onclick="changeYear(-1)">◀</button>
        <div class="stats-year-label" id="stats-year-label">${state.currentYear}</div>
        <button class="stats-year-btn" onclick="changeYear(1)">▶</button>
      </div>
      <div style="text-align:center;padding:20px;color:var(--text-sub)">読み込み中...</div>
    `;

    try {
      const data = await apiGet('stats', { year: state.currentYear });
      state.statsData = data;
      renderStatsData(data);
    } catch(e) {
      content.innerHTML += `<div style="padding:16px;color:var(--text-sub)">取得失敗: ${e.message}</div>`;
    }
  }

  function renderStatsData(data) {
    const content = document.getElementById('stats-content');
    const concertTop = data.concert_ranking.slice(0, 10);
    const songTop    = data.song_ranking.slice(0, 10);

    const concertRows = concertTop.map((r, i) => `
      <div class="stats-rank-item">
        <span class="stats-rank-num">${i + 1}</span>
        <span class="stats-rank-name">${esc(r.name)}</span>
        <span class="stats-rank-count">${r.count}本</span>
      </div>
    `).join('');

    const songRows = songTop.map((r, i) => `
      <div class="stats-rank-item">
        <span class="stats-rank-num">${i + 1}</span>
        <span class="stats-rank-name">${esc(r.name)}</span>
        <span class="stats-rank-count">${r.count}回</span>
      </div>
    `).join('');

    const moreConBtn = data.concert_ranking.length > 10
      ? `<button class="stats-more-btn" onclick="showMore('concert')">もっと見る（全${data.concert_ranking.length}件）</button>` : '';
    const moreSongBtn = data.song_ranking.length > 10
      ? `<button class="stats-more-btn" onclick="showMore('song')">もっと見る（全${data.song_ranking.length}件）</button>` : '';

    content.innerHTML = `
      <div class="stats-year-nav">
        <button class="stats-year-btn" onclick="changeYear(-1)">◀</button>
        <div class="stats-year-label" id="stats-year-label">${state.currentYear}</div>
        <button class="stats-year-btn" onclick="changeYear(1)">▶</button>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">参戦本数</div>
        <div class="stats-total">${data.total_count}</div>
        <div class="stats-total-label">本</div>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">アーティスト別参戦本数</div>
        ${concertRows}
        ${moreConBtn}
      </div>
      <div class="stats-section">
        <div class="stats-section-title">楽曲演奏回数</div>
        ${songRows}
        ${moreSongBtn}
      </div>

    `;
  }

  async function changeYear(delta) {
    state.currentYear += delta;
    await renderStats();
  }

  function showMore(type) {
    if (!state.statsData) return;
    const data = type === 'concert' ? state.statsData.concert_ranking : state.statsData.song_ranking;
    const unit = type === 'concert' ? '本' : '回';
    const rows = data.map((r, i) => `
      <div class="stats-rank-item">
        <span class="stats-rank-num">${i + 1}</span>
        <span class="stats-rank-name">${esc(r.name)}</span>
        <span class="stats-rank-count">${r.count}${unit}</span>
      </div>
    `).join('');

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-title">全件表示</div>
      ${rows}
      <button class="modal-cancel-btn" onclick="closeModal()">閉じる</button>
    `;
    openModal();
  }

  async function clearCache() {
    try {
      await apiGet('clear_cache');
      state.setlistCache = {};
      showToast('✅ キャッシュをクリアしました');
    } catch(e) {
      showToast('❌ ' + e.message);
    }
  }

  // ============================================================
  // タブ切り替え
  // ============================================================
  async function switchTab(tab) {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');

    state.currentTab = tab;

    // フィルターバー・カウンターの表示制御
    document.getElementById('filter-bar').style.display = tab === 'concerts' ? 'flex' : 'none';
    document.getElementById('counter').style.display    = tab === 'concerts' ? 'block' : 'none';

    if (tab === 'stats' && !state.statsData) {
      await renderStats();
    }
  }

  // ============================================================
  // 更新
  // ============================================================
  async function doSync() {
    try {
      // GAS側キャッシュクリア
      await fetch(GAS_URL + '?action=clear_cache').catch(() => {});
      // ブラウザ側メモリキャッシュクリア
      clearApiCache();
      // localStorageの公演データを全クリア
      Object.keys(localStorage)
        .filter(k => k.startsWith('lv_concerts_'))
        .forEach(k => localStorage.removeItem(k));
      const [concerts, artists] = await Promise.all([
        apiGet('concerts', { year: state.currentFilterYear }),
        apiGet('artists'),
      ]);

      localStorage.setItem('lv_concerts_' + state.currentFilterYear, JSON.stringify(concerts));
      localStorage.setItem('lv_artists', JSON.stringify(artists));

      state.concertsByYear[state.currentFilterYear] = concerts;
      state.concerts     = concerts;
      state.artists      = artists;
      state.setlistCache = {};
      state.statsData    = null;
      // localStorageのセットリストキャッシュを全クリア
      Object.keys(localStorage)
        .filter(k => k.startsWith('lv_setlist_'))
        .forEach(k => localStorage.removeItem(k));
      // アーティスト画像のlocalStorageキャッシュをクリアして再取得
      localStorage.removeItem('lv_artist_images');
      state.artistImages = {};
      await _loadArtistImages();

      const now = new Date();
      state.syncTime = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      document.getElementById('sync-time').textContent = '最終同期: ' + state.syncTime;

      renderConcerts();
      renderFilters();
      renderArtists();
      goTo(state.currentIdx);

      showToast('✅ 更新しました');
    } catch(e) {
      showToast('❌ 更新失敗: ' + e.message);
    }
  }

  // ============================================================
  // トースト
  // ============================================================
  // ============================================================
  // アーティストデフォルト画像をBase64でlocalStorageに永続保存
  // ============================================================
  async function _loadArtistImages() {
    const lsKey  = 'lv_artist_images';
    const cached = localStorage.getItem(lsKey);

    if (cached) {
      state.artistImages = JSON.parse(cached);
      console.log('✅ アーティスト画像: localStorageから取得 ' + Object.keys(state.artistImages).length + '件');
      return;
    }

    // localStorageになければAPIから取得
    try {
      const data = await apiGet('artist_images');
      state.artistImages = data;
      localStorage.setItem(lsKey, JSON.stringify(data));
      console.log('✅ アーティスト画像: APIから取得・保存 ' + Object.keys(data).length + '件');
    } catch(e) {
      console.warn('アーティスト画像取得失敗: ' + e.message);
      state.artistImages = {};
    }
  }

  // ============================================================
  // 本日に最も近い公演のインデックスを返す（昇順配列前提）
  // 指定日以降で最も近い公演 → なければ最後の公演
  // ============================================================
  function _findNearestIdx(concerts, dateStr) {
    if (!concerts || concerts.length === 0) return 0;
    const idx = concerts.findIndex(c => c.date >= dateStr);
    if (idx >= 0) return idx;
    return concerts.length - 1; // 全て過去 → 最後（最新）
  }

  // ============================================================
  // 日付ジャンプ機能
  // ============================================================
  function openDateJump() {
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-title">📅 日付ジャンプ</div>
      <div class="modal-item">
        <div class="modal-label">指定日以降で最も近い公演に移動します</div>
        <input class="modal-input" type="date" id="jump-date" value="${today}">
      </div>
      <button class="modal-save-btn" onclick="doDateJump()">ジャンプ</button>
      <button class="modal-cancel-btn" onclick="closeModal()">キャンセル</button>
    `;
    openModal();
  }

  function doDateJump() {
    const dateVal = document.getElementById('jump-date').value;
    if (!dateVal) return;

    const idx = _findNearestIdx(state.filteredConcerts, dateVal);

    if (state.filteredConcerts.length === 0) {
      showToast('該当する公演が見つかりません');
      return;
    }

    closeModal();
    goTo(idx);
    showToast(state.filteredConcerts[idx].date_label + ' にジャンプしました');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ============================================================
  // ユーティリティ
  // ============================================================
  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
