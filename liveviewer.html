<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="たろうのLiveViewer">
  <link rel="manifest" href="liveviewer_manifest.json">
  <title>たろうのLiveViewer</title>
  <style>
    :root {
      --bg:           #1a1f1e;
      --bg-card:      #222927;
      --bg-future:    #252e2a;
      --bg-header:    #1e2422;
      --accent:       #4caf7d;
      --accent-dim:   #2d6b4a;
      --text:         #e8f0ec;
      --text-sub:     #8fa898;
      --text-dim:     #5a7066;
      --border:       #2e3d38;
      --encore:       #a0cfb5;
      --tab-h:        60px;
      --sync-h:       28px;
      --footer-h:     90px;
      --header-h:     96px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      height: 100dvh;
      overflow: hidden;
    }

    /* ============ ヘッダー ============ */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding-top: env(safe-area-inset-top);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 48px;
    }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
    }
    .header-counter {
      font-size: 12px;
      color: var(--text-sub);
    }
    .date-jump-btn {
      background: none;
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 6px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ============ メイン ============ */
    .main {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      padding-top: calc(env(safe-area-inset-top) + 48px + 36px);
      padding-bottom: var(--footer-h);
    }
    .page { display: none; width: 100%; height: 100%; }
    .page.active { display: block; }
    #page-artists.active { display: flex; flex-direction: column; }
    #page-artist-concerts.active { display: flex; flex-direction: column; }

    /* ============ スワイパー ============ */
    .swiper-outer { width: 100%; height: 100%; overflow: hidden; position: relative; }
    .swiper-track {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }
    .swiper-slide {
      flex-shrink: 0;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .swiper-slide::-webkit-scrollbar { display: none; }

    /* ============ 公演カード ============ */
    .poster-area {
      width: 100%;
      height: 25vh;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: var(--bg-card);
    }
    .poster-area img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 10%; }
    .poster-artist-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: 50% 10%; }
    .poster-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--bg-card) 0%, #1e2e28 100%);
    }
    .poster-placeholder-icon { font-size: 36px; opacity: 0.5; }
    .poster-placeholder-name {
      font-size: 16px; font-weight: 700;
      color: var(--accent); opacity: 0.8;
      text-align: center; padding: 0 20px;
    }
    .future-badge {
      position: absolute; top: 10px; right: 10px;
      background: rgba(76,175,125,0.9); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 10px;
    }

    .concert-info {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .concert-date   { font-size: 24px; color: var(--text-sub); margin-bottom: 2px; }
    .concert-date-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2px;
    }
    .concert-photo-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--accent-dim); border: 1px solid var(--accent);
      border-radius: 8px; padding: 5px 10px;
      font-size: 11px; font-weight: 700; color: var(--accent);
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
    }
    .concert-artist { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
    .concert-venue  { font-size: 17px; color: var(--accent); }
    .concert-perf-name {
      font-size: 14px; color: var(--text-sub); margin-top: 2px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .concert-perf-name.expanded { white-space: normal; }

    .artist-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .artist-tabs::-webkit-scrollbar { display: none; }
    .artist-tab {
      flex-shrink: 0;
      padding: 9px 18px;
      font-size: 13px; font-weight: 600;
      color: var(--text-sub);
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: all 0.2s;
    }
    .artist-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .setlist-area {
      padding: 14px 16px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .setlist-label {
      font-size: 10px; font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .setlist-track {
      display: flex; align-items: baseline; gap: 10px;
      padding: 5px 0; border-bottom: 1px solid var(--border);
    }
    .setlist-track:last-child { border-bottom: none; }
    .track-num {
      font-size: 14px; color: var(--text-dim);
      min-width: 24px; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .track-name { font-size: 20px; color: var(--text); }
    .track-name.encore { color: var(--encore); }
    .encore-prefix {
      font-size: 12px; font-weight: 700;
      color: var(--accent); margin-right: 3px;
    }
    .no-setlist {
      padding: 30px 16px;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ============ 演者一覧 ============ */
    .artist-year-tabs {
      display: flex; gap: 8px; padding: 0 16px 4px;
      overflow-x: auto; white-space: nowrap;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .artist-year-tabs::-webkit-scrollbar { display: none; }
    .artist-year-tab {
      padding: 6px 14px; border-radius: 16px;
      background: var(--bg-card); color: var(--text-sub);
      font-size: 14px; font-weight: 700; cursor: pointer;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .artist-year-tab.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .artist-stat-bar {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; display: flex; align-items: baseline; gap: 6px;
    }
    .artist-stat-label { font-size: 18px; color: var(--text-sub); }
    .artist-stat-num   { font-size: 30px; font-weight: 800; color: var(--text); }
    .artist-stat-sep   { font-size: 24px; color: var(--text-sub); }
    .artist-list { overflow-y: auto; flex: 1; padding: 12px 16px; }

    /* ============ 演者別公演一覧（中間一覧・Ver2.8） ============ */
    #page-concerts { position: relative; }
    .back-to-list-btn {
      position: absolute; top: 8px; left: 8px; z-index: 50;
      background: var(--accent); color: #fff; border: none; border-radius: 20px;
      padding: 6px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }
    .ac-header {
      display: flex; flex-direction: column; gap: 0;
      padding: 0 16px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .ac-top { display: flex; align-items: center; gap: 8px; }
    .ac-back {
      background: none; border: none; color: var(--accent);
      font-size: 24px; font-weight: 800; cursor: pointer; padding: 0 4px; flex-shrink: 0;
    }
    .ac-year-tabs {
      display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; flex: 1; min-width: 0;
    }
    .ac-year-tabs::-webkit-scrollbar { display: none; }
    .ac-title { font-size: 28px; font-weight: 800; color: #ffe082; line-height: 1.15; margin-top: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ac-stat  { font-size: 16px; color: var(--text-sub); text-align: right; line-height: 1; }
    .ac-stat-num { font-size: 24px; font-weight: 800; color: var(--text); }
    .ac-list  { overflow-y: auto; flex: 1; }
    .ac-row {
      display: flex; align-items: baseline; gap: 8px;
      padding: 7px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; white-space: nowrap; overflow: hidden;
    }
    .ac-row.future { background: var(--bg-future); }
    .ac-date  { font-size: 18px; color: var(--text); flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .ac-venue { font-size: 16px; color: var(--accent); flex-shrink: 0; }
    .ac-sub   { font-size: 14px; color: var(--text-sub); flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .ac-oneman { color: #ec6d51; font-weight: 700; }
    .artist-item {
      display: flex; align-items: center; gap: 14px;
      padding: 3px 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .artist-item:last-child { border-bottom: none; }
    .artist-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0; overflow: hidden;
    }
    .artist-icon img { width: 100%; height: 100%; object-fit: cover; }
    .artist-info { flex: 1; }
    .artist-item-name { font-size: 17px; font-weight: 700; color: var(--text); }
    .artist-item-sub  { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .artist-item-count {
      font-size: 20px; font-weight: 800;
      color: var(--accent); flex-shrink: 0;
    }
    .artist-item-count .num-attended { color: #ffffff; }

    /* ============ 統計 ============ */
    .stats-page { overflow-y: auto; height: 100%; }
    .stats-year-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .stats-year-label { font-size: 26px; font-weight: 800; color: var(--accent); }
    .stats-year-btn {
      font-size: 22px; color: var(--text-sub);
      background: none; border: none; cursor: pointer; padding: 6px 12px;
    }
    .stats-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .stats-section-title {
      font-size: 11px; font-weight: 700; color: var(--text-dim);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
    }
    .stats-total {
      font-size: 48px; font-weight: 800; color: var(--accent);
      text-align: center; padding: 8px 0;
    }
    .stats-total-label { font-size: 14px; color: var(--text-sub); text-align: center; }
    .stats-rank-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .stats-rank-item:last-child { border-bottom: none; }
    .stats-rank-num {
      font-size: 14px; color: var(--text-dim);
      min-width: 24px; text-align: right;
    }
    .stats-rank-name { flex: 1; font-size: 15px; color: var(--text); }
    .stats-rank-count { font-size: 18px; font-weight: 700; color: var(--accent); }
    .stats-more-btn {
      width: 100%; padding: 10px;
      background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--accent);
      font-size: 13px; cursor: pointer; margin-top: 10px;
    }
    .stats-cache-clear {
      padding: 16px; text-align: center;
    }
    .stats-cache-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-dim);
      font-size: 12px; padding: 8px 20px; cursor: pointer;
    }

    /* ============ ライトボックス ============ */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.95);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .lightbox.active { opacity: 1; pointer-events: all; }
    .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .lightbox-ph { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .lightbox-ph-icon { font-size: 80px; }
    .lightbox-ph-name { font-size: 26px; font-weight: 800; color: var(--accent); text-align: center; padding: 0 20px; }

    /* ============ 修正モーダル ============ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%; background: #1e2e28;
      border-radius: 20px 20px 0 0;
      padding: 16px 20px calc(env(safe-area-inset-bottom) + 20px);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      max-height: 85vh; overflow-y: auto;
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 16px;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
    .modal-item {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;
    }
    .modal-label { font-size: 12px; color: var(--text-sub); }
    .modal-input {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      color: var(--text); font-size: 16px;
      width: 100%;
    }
    .modal-select {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      color: var(--text); font-size: 16px;
      width: 100%;
    }
    .modal-save-btn {
      width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: 10px;
      color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
    }
    .modal-cancel-btn {
      width: 100%; padding: 12px;
      background: none; border: 1px solid var(--border); border-radius: 10px;
      color: var(--text-sub); font-size: 15px;
      cursor: pointer; margin-top: 8px;
    }
    /* セトリ編集モード */
    .edit-setlist-wrapper { padding: 8px 0; }
    .edit-section-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-dim); letter-spacing: 0.05em;
      padding: 10px 0 4px; text-transform: uppercase;
    }
    .edit-song-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid var(--border);
    }
    .edit-song-controls { display: flex; flex-direction: column; gap: 2px; }
    .edit-arrow-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); border-radius: 4px;
      font-size: 12px; width: 28px; height: 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .edit-arrow-btn:disabled { opacity: 0.25; }
    .edit-song-num {
      font-size: 13px; color: var(--text-dim);
      min-width: 20px; text-align: right;
    }
    .edit-song-name {
      flex: 1; font-size: 16px; color: var(--text);
      padding: 4px 0;
    }
    .edit-delete-btn {
      background: none; border: none;
      color: #e57373; font-size: 16px;
      padding: 4px 8px;
    }
    .edit-add-btn {
      width: 100%; margin-top: 12px; padding: 10px;
      background: none; border: 1px dashed var(--border);
      color: var(--accent); border-radius: 8px;
      font-size: 15px;
    }
    .edit-action-buttons {
      display: flex; flex-direction: column; gap: 8px;
      margin-top: 16px;
    }
    .edit-delete-song-btn {
      width: 100%; padding: 12px;
      background: none; border: 1px solid #e57373;
      color: #e57373; border-radius: 8px;
      font-size: 15px; font-weight: 600;
    }
    .modal-display-section {
      padding: 12px 0 8px;
      border-radius: 8px;
    }
    .modal-display-item {
      font-size: 16px;
      color: var(--text);
      padding: 4px 0;
    }
    .modal-perf-name {
      font-size: 13px;
      color: var(--text-dim);
      padding: 4px 0 2px;
    }
    .modal-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }
    .modal-menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; color: var(--text); font-size: 16px;
    }
    .modal-menu-item:last-child { border-bottom: none; }
    .modal-menu-icon { font-size: 20px; }

    /* ============ トースト ============ */
    .toast {
      position: fixed; bottom: calc(var(--footer-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: all 0.3s; pointer-events: none;
      white-space: nowrap; z-index: 2000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ============ フッター ============ */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg-header); border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sync-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 16px; border-bottom: 1px solid var(--border);
      height: var(--sync-h);
    }
    .sync-time { font-size: 11px; color: var(--text-dim); }
    .sync-btn {
      display: flex; align-items: center; gap: 4px;
      background: none; border: 1px solid var(--accent-dim);
      border-radius: 6px; padding: 3px 8px;
      color: var(--accent); font-size: 11px; cursor: pointer;
    }
    .tab-bar { display: flex; height: var(--tab-h); }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; color: var(--text-dim); }
    .tab-item.active .tab-label { color: var(--accent); }
    .tab-icon.syncing { animation: lvspin 1s linear infinite; }
    @keyframes lvspin { to { transform: rotate(360deg); } }

    /* ============ ローディング ============ */
    .loading {
      position: fixed; inset: 0; z-index: 3000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.4s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .loading-icon { font-size: 60px; }
    .loading-title { font-size: 22px; font-weight: 800; color: var(--accent); }
    .loading-msg { font-size: 13px; color: var(--text-sub); text-align: center; padding: 0 24px; }
    .loading-actions { display: flex; flex-direction: column; gap: 10px; align-items: stretch; width: 80%; max-width: 320px; }
    .loading-btn { padding: 12px 16px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    .loading-btn:active { opacity: 0.8; }
    .loading-note { font-size: 12px; color: var(--text-sub); text-align: center; line-height: 1.6; }
    .loading-note a { color: var(--accent); }
    .spinner {
      width: 30px; height: 30px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============ オフライン表示 ============ */
    .offline-bar {
      display: none;
      background: #5a3a00; color: #ffcc00;
      font-size: 12px; text-align: center; padding: 5px;
    }
    .offline-bar.show { display: block; }

    /* ============ Ver1.5 新規スタイル ============ */
    /* ポスター写真エリア：長押し誤動作防止 */
    .poster-area {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .poster-area img { pointer-events: none; }

    /* メニューボタン群 */
    .edit-btn-group { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
    .edit-btn {
      width: 100%; padding: 14px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 16px; text-align: left;
      cursor: pointer;
    }
    .edit-btn-primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .edit-btn-danger  { border-color: #e57373; color: #e57373; }
    .modal-section-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 16px; }

    /* 写真プレビュー */
    .preview-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0; max-height: 200px; overflow-y: auto; }
    .preview-img  { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
    .preview-count { text-align: center; color: var(--text-sub); font-size: 13px; padding: 4px 0 8px; }

    /* 補足テキストエリア */
    .edit-textarea {
      width: 100%; box-sizing: border-box;
      background: var(--bg-card); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 14px; resize: vertical; line-height: 1.6;
    }

    /* 原文表示 */
    .original-text-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px;
      font-size: 13px; color: var(--text-sub); word-break: break-all; margin-top: 4px;
    }

    /* ⚠️マーク */
    .unconfirmed-mark { font-size: 14px; cursor: pointer; margin-right: 4px; flex-shrink: 0; }

    /* 全件確認済みボタン */
    .approve-all-btn-area { padding: 12px 16px 4px; text-align: center; }
    .approve-all-btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 14px; font-weight: 700;
      cursor: pointer; width: 100%;
    }

    /* ============ 遠征管理タブ ============ */
    #page-expedition { display: flex; flex-direction: column; }
    .exp-subtabs { display: flex; gap: 8px; padding: 10px 16px 6px; flex-shrink: 0; }
    .exp-subtab {
      flex: 1; text-align: center; padding: 8px 0; border-radius: 8px;
      font-size: 13px; font-weight: 700; color: var(--text-sub);
      background: var(--bg-card); border: 1px solid var(--border); cursor: pointer;
    }
    .exp-subtab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .exp-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 16px 10px; flex-shrink: 0;
    }
    .exp-topbar-label { font-size: 20px; font-weight: 700; color: var(--text); }
    .exp-cal-btn {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      width: 34px; height: 34px; font-size: 16px; color: var(--text); cursor: pointer;
    }

    #exp-swiper { flex: 1; min-height: 0; }
    .exp-day { padding: 4px 16px 24px; }
    .exp-empty { text-align: center; color: var(--text-dim); padding: 60px 20px; font-size: 14px; }

    .exp-card { border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.45); }
    .exp-card-name   { font-size: 14px; font-weight: 800; color: #111; margin-bottom: 3px; }
    .exp-card-route  { font-size: 12.5px; color: #333; margin-bottom: 6px; }
    .exp-card-meta   { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; }
    .exp-card-status { font-weight: 800; color: #111; }
    .exp-card-amount { font-weight: 800; color: #333; font-variant-numeric: tabular-nums; }

    /* 交通：出発地→到着地の行程は最重要（便名・ステータス等は現状サイズのまま） */
    .exp-card-transport-route { font-size: 19px; font-weight: 700; color: #111; margin-bottom: 6px; line-height: 1.4; }

    /* ホテル名は大きく、（チェックイン）等の補足はそのまま */
    .exp-card-hotel-name   { font-size: 20px; font-weight: 800; color: #111; }
    .exp-card-hotel-suffix { font-size: 12px; font-weight: 700; color: #333; }

    /* ライブ：バンド名は大きく、会場名も大きく、公演名はバンド名より小さく（無ければ詰める） */
    .exp-card-live-name    { font-size: 22px; font-weight: 800; color: #111; margin-bottom: 3px; }
    .exp-card-live-perfname{ font-size: 14px; color: #111; margin-bottom: 4px; }
    .exp-card-live-venue   { font-size: 16.5px; color: #333; }

    .exp-card.live  { background: #f5e6a3; }
    .exp-card.hotel { background: #c5e8d2; }
    .exp-card.hotel.duplicate { background: #f6c6c6; }
    .exp-card.hotel.duplicate .exp-card-hotel-name,
    .exp-card.hotel.duplicate .exp-card-name { color: #7a1f1f; }

    .exp-card.transport.tier-25  { background: #eaf3fa; }
    .exp-card.transport.tier-55  { background: #d3e7f5; }
    .exp-card.transport.tier-100 { background: #bfdff2; }

    .exp-dots { display: flex; justify-content: center; gap: 6px; padding: 8px 0; flex-shrink: 0; }
    .exp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
    .exp-dot.active { background: var(--accent); width: 16px; border-radius: 4px; }

    /* 遠征一覧（B） */
    .exp-topbar-sub { font-size: 13px; color: var(--text-sub); margin-top: 2px; }
    .exp-daylabel {
      font-size: 16px; font-weight: 800; color: var(--text);
      letter-spacing: .02em; margin-bottom: 8px;
    }
    .exp-dash-tap-hint {
      text-align: center; font-size: 11.5px; color: var(--text-dim);
      padding: 6px 16px 2px;
    }

    /* 日付ブロックごとに背景色を交互に変えて区切りを分かりやすく（紺色⇔えんじ色） */
    .exp-day-block { padding: 14px 16px 4px; margin: 0 -16px 4px; }
    .exp-day-block.alt-a { background: #16213a; }
    .exp-day-block.alt-b { background: #3a1420; }
  </style>
</head>
<body>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="loading-icon">🎵</div>
  <div class="loading-title">たろうのLiveViewer</div>
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">データ取得中...</div>
  <div class="loading-actions" id="loading-actions"></div>
</div>

<!-- オフラインバー -->
<div class="offline-bar" id="offline-bar">
  📴 オフラインです。最終同期データを表示しています
</div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-inner">
    <div class="header-title">🎵 LiveViewer</div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="date-jump-btn" id="date-jump-btn" onclick="openDateJump()">📅</button>
      <div class="header-counter" id="counter"></div>
    </div>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
</div>

<!-- メインコンテンツ -->
<div class="main">

  <!-- 公演一覧ページ -->
  <div class="page active" id="page-concerts">
    <button class="back-to-list-btn" id="back-to-list-btn" onclick="_lvBackToArtistList()" style="display:none;">← 一覧に戻る</button>
    <div class="swiper-outer" id="swiper">
      <div class="swiper-track" id="track"></div>
    </div>
  </div>

  <!-- 演者一覧ページ -->
  <div class="page" id="page-artists">
    <div class="artist-year-tabs" id="artist-year-tabs"></div>
    <div class="artist-stat-bar" id="artist-stat-bar"></div>
    <div class="artist-list" id="artist-list"></div>
  </div>

  <!-- 演者別公演一覧（中間一覧・Ver2.8） -->
  <div class="page" id="page-artist-concerts">
    <div class="ac-header">
      <div class="ac-top">
        <button class="ac-back" onclick="hideArtistConcertList()">←</button>
        <div class="ac-year-tabs" id="ac-year-tabs"></div>
      </div>
      <div class="ac-title" id="ac-title"></div>
      <div class="ac-stat" id="ac-stat"></div>
    </div>
    <div class="ac-list" id="ac-list"></div>
  </div>

  <!-- 統計ページ -->
  <div class="page" id="page-stats">
    <div class="stats-page" id="stats-content"></div>
  </div>

  <!-- 遠征管理ページ -->
  <div class="page" id="page-expedition">
    <div class="exp-subtabs">
      <div class="exp-subtab active" id="exp-subtab-checklist" onclick="expSwitchSubtab('checklist')">チェックリスト</div>
      <div class="exp-subtab" id="exp-subtab-dashboard" onclick="expSwitchSubtab('dashboard')">遠征一覧</div>
    </div>
    <div class="exp-topbar" id="exp-topbar">
      <div>
        <div class="exp-topbar-label" id="exp-top-label"></div>
      </div>
    </div>
    <div class="swiper-outer" id="exp-swiper">
      <div class="swiper-track" id="exp-track"></div>
    </div>
    <div class="exp-dots" id="exp-dots"></div>

    <div class="exp-topbar" id="exp-dash-topbar" style="display:none">
      <div>
        <div class="exp-topbar-label" id="exp-dash-top-label"></div>
        <div class="exp-topbar-sub" id="exp-dash-top-sub"></div>
      </div>
    </div>
    <div class="swiper-outer" id="exp-dash-swiper" style="display:none">
      <div class="swiper-track" id="exp-dash-track"></div>
    </div>
    <div class="exp-dots" id="exp-dash-dots" style="display:none"></div>
  </div>

</div>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div id="lb-content"></div>
</div>

<!-- 修正モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- フッター -->
<div class="footer">
  <div class="sync-bar">
    <div class="sync-time" id="sync-time">同期中...</div>
  </div>
  <div class="tab-bar">
    <div class="tab-item active" id="tab-concerts" onclick="switchTab('concerts')">
      <div class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="8" cy="18" rx="4" ry="3" fill="#ffe082"/>
          <ellipse cx="18" cy="15" rx="3" ry="2.5" fill="#ffe082"/>
          <rect x="11.5" y="4" width="2" height="14" rx="1" fill="#ffe082"/>
          <rect x="11.5" y="4" width="9" height="2" rx="1" fill="#ffe082"/>
        </svg>
      </div>
      <div class="tab-label">公演一覧</div>
    </div>
    <div class="tab-item" id="tab-artists" onclick="switchTab('artists')">
      <div class="tab-icon">👤</div>
      <div class="tab-label">演者一覧</div>
    </div>
    <div class="tab-item" id="tab-stats" onclick="switchTab('stats')">
      <div class="tab-icon">📊</div>
      <div class="tab-label">統計</div>
    </div>
    <div class="tab-item" id="tab-expedition" onclick="switchTab('expedition')">
      <div class="tab-icon">🧳</div>
      <div class="tab-label">遠征管理</div>
    </div>
    <div class="tab-item" onclick="doSync()">
      <div class="tab-icon" id="sync-icon">🔄</div>
      <div class="tab-label">更新</div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // 設定
  // ============================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwVPjE1NTYWv6FWYOXovTWg9iCAP4CXx7QeDLVrg9aT8-HBoqEBkzIeDcIo7-H29cuOWQ/exec'; // ← GAS WebApp URLをここに設定

  // ============================================================
  // 状態管理
  // ============================================================
  let state = {
    concerts:           [],
    filteredConcerts:   [],
    concertsByYear:     {},
    years:              [],
    currentFilterYear:  String(new Date().getFullYear()),
    artists:            [],
    artistYears:        [],
    currentArtistTab:   'all',
    currentIdx:         0,
    currentTab:         'concerts',
    currentYear:        new Date().getFullYear(),
    statsData:          null,
    filters:            { artist: null, year: null, prefecture: null },
    isOffline:          false,
    syncTime:           '',
    setlistCache:       {},
    editMode:           false,
    _storageWarned:     false,
    _syncing:           false,
    _pendingTarget:     null,
    cameFromArtistList: false,
    _acArtistId:        null,
  };

  // ============================================================
  // API（ブラウザ側メモリキャッシュ付き）
  // ============================================================
  const apiCache    = {};  // メモリキャッシュ
  const apiFetching = {};  // 取得中フラグ（二重リクエスト防止）

  async function apiGet(action, params = {}) {
    // キャッシュキーを生成
    const cacheKey = action + '_' + JSON.stringify(params);

    // メモリキャッシュヒット → 即返す
    if (apiCache[cacheKey]) {
      return apiCache[cacheKey];
    }

    // 取得中の場合は完了を待つ
    if (apiFetching[cacheKey]) {
      await new Promise(resolve => {
        const check = setInterval(() => {
          if (!apiFetching[cacheKey]) { clearInterval(check); resolve(); }
        }, 100);
      });
      return apiCache[cacheKey];
    }

    apiFetching[cacheKey] = true;

    try {
      const url = new URL(GAS_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

      const res  = await fetch(url.toString());
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'APIエラー');

      // メモリキャッシュに保存
      apiCache[cacheKey] = data.data;
      return data.data;

    } catch(e) {
      if (!navigator.onLine) {
        state.isOffline = true;
        document.getElementById('offline-bar').classList.add('show');
        // 【バグ⑬】保存キーは 'lv_'+action ではなくaction毎に形が違うため、正しく対応付けて復元する
        const fb = _lvOfflineFallback(action, params);
        if (fb !== null) return fb;
      }
      throw e;
    } finally {
      apiFetching[cacheKey] = false;
    }
  }

  // 【バグ⑬】オフライン時のlocalStorageフォールバック（保存形式に合わせて復元）
  function _lvOfflineFallback(action, params) {
    try {
      if (action === 'concerts') {
        const y   = (params && params.year) ? params.year : String(new Date().getFullYear());
        const raw = localStorage.getItem('lv_concerts_' + y);
        return raw ? JSON.parse(raw) : null;
      }
      if (action === 'artists_v2') {
        const a = localStorage.getItem('lv_artists');
        if (!a) return null;
        return {
          artists: JSON.parse(a),
          years:   JSON.parse(localStorage.getItem('lv_artist_years') || '[]'),
          stats:   JSON.parse(localStorage.getItem('lv_artist_stats') || '{}')
        };
      }
      if (action === 'years') {
        const raw = localStorage.getItem('lv_years');
        return raw ? JSON.parse(raw) : null;
      }
    } catch(e) {}
    return null;
  }

  // メモリキャッシュをクリア（更新ボタン・修正後に使用）
  function clearApiCache() {
    Object.keys(apiCache).forEach(k => delete apiCache[k]);
  }

  async function apiPost(action, body = {}) {
    const res  = await fetch(GAS_URL, {
      method: 'POST',
      body:   JSON.stringify({ action, ...body })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'APIエラー');
    return data.data;
  }

  // ============================================================
  // 初期化
  // ============================================================
  window.addEventListener('load', async () => {
    // Service Worker登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('liveviewer_sw.js').catch(() => {});
    }

    try {
      // 【Ver1.5】localStorageにデータが残っていれば即時表示（起動高速化）
      const thisYear   = String(new Date().getFullYear());
      const lsYears    = localStorage.getItem('lv_years');
      const lsArtists  = localStorage.getItem('lv_artists');
      const lsArtistYears = localStorage.getItem('lv_artist_years');
      const lsArtistStats = localStorage.getItem('lv_artist_stats');
      const lsConcerts = localStorage.getItem('lv_concerts_' + thisYear);

      if (lsYears && lsArtists && lsConcerts) {
        state.years                    = JSON.parse(lsYears);
        state.currentFilterYear        = thisYear;
        state.artists                  = JSON.parse(lsArtists);
        state.artistYears              = lsArtistYears ? JSON.parse(lsArtistYears) : [];
        state.artistStats              = lsArtistStats ? JSON.parse(lsArtistStats) : {};
        state.concertsByYear[thisYear] = JSON.parse(lsConcerts);
        state.concerts                 = JSON.parse(lsConcerts);

        renderConcerts();
        renderFilters();
        renderArtists();

        const today = new Date().toISOString().slice(0, 10);
        goTo(_findNearestIdx(state.filteredConcerts, today));

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('sync-time').textContent = 'キャッシュ表示中（🔄で更新）';
        return;
      }

      // localStorageが空の場合は従来通りAPIから取得
      document.getElementById('loading-msg').textContent = '年一覧取得中...';
      const years = await apiGet('years');
      state.years      = years;
      state.currentFilterYear = thisYear;

      document.getElementById('loading-msg').textContent = '公演データ取得中...';
      const [concerts, artistsResp] = await Promise.all([
        apiGet('concerts', { year: state.currentFilterYear }),
        apiGet('artists_v2'),
      ]);

      const artists     = artistsResp.artists || [];
      const artistYears = artistsResp.years   || [];
      const artistStats = artistsResp.stats   || {};

      _lvSafeSetItem('lv_concerts_' + state.currentFilterYear, JSON.stringify(concerts));
      _lvSafeSetItem('lv_artists', JSON.stringify(artists));
      _lvSafeSetItem('lv_artist_years', JSON.stringify(artistYears));
      _lvSafeSetItem('lv_artist_stats', JSON.stringify(artistStats));
      _lvSafeSetItem('lv_years',   JSON.stringify(years));

      state.concertsByYear[state.currentFilterYear] = concerts;
      state.concerts     = concerts;
      state.artists      = artists;
      state.artistYears  = artistYears;
      state.artistStats  = artistStats;

      state.syncTime = new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      document.getElementById('sync-time').textContent = '最終同期: ' + state.syncTime;

      renderConcerts();
      renderFilters();
      renderArtists();

      const today = new Date().toISOString().slice(0, 10);
      goTo(_findNearestIdx(state.filteredConcerts, today));

    } catch(e) {
      await _lvShowStartupError(e);
      return;
    }

    document.getElementById('loading').classList.add('hidden');
  });

  // ============================================================
  // 公演一覧レンダリング
  // ============================================================
  function renderConcerts() {
    state.filteredConcerts = filterConcerts(state.concerts);
    const track = document.getElementById('track');
    track.innerHTML = '';

    state.filteredConcerts.forEach((c, i) => {
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
      slide.innerHTML = buildConcertCard(c, i);
      track.appendChild(slide);
    });

    document.getElementById('counter').textContent =
      state.filteredConcerts.length > 0
        ? `${state.currentIdx + 1} / ${state.filteredConcerts.length}`
        : '0 / 0';
  }

  function buildConcertCard(c, idx) {
    // ポスター写真 → デフォルト画像（GitHub Pages）→ プレースホルダーの優先順位
    const artistId = c.artists.length > 0 ? c.artists[0].id : '';
    const artNames = esc(c.artists.map(a => a.name).join(' / '));
    const phHtml = `<div class="poster-placeholder">
             <div class="poster-placeholder-icon">🎸</div>
             <div class="poster-placeholder-name">${artNames}</div>
           </div>`;
    let posterHtml;
    if (c.has_poster && c.poster_url) {
      posterHtml = `<img src="${c.poster_url}" alt="ポスター" loading="lazy">`;
    } else if (artistId) {
      // 演者画像はGitHub Pagesを直接参照。画像が無い演者は404になるので、
      // onerrorで画像を隠して下地のプレースホルダーを見せる
      const url = 'https://taroh3.github.io/live-management/live_artist_' + artistId.replace(/-/g, '') + '.jpg';
      posterHtml = phHtml +
        `<img class="poster-artist-img" src="${url}" alt="${artNames}" loading="lazy" onerror="this.style.display='none'">`;
    } else {
      posterHtml = phHtml;
    }

    const futureBadge = c.is_future ? `<div class="future-badge">📅 予定</div>` : '';
    const artistLabel = c.artists.map(a => a.name).join(' / ');
    const venueLabel  = c.venue ? c.venue.name : '';
    const dayNight    = c.day_night ? `　${c.day_night}` : '';

    return `
      <div class="concert-card" style="${c.is_future ? 'background:var(--bg-future)' : ''}">
        <div class="poster-area" onclick="openLightbox(${idx})">
          ${posterHtml}
          ${futureBadge}
        </div>
        <div class="concert-info">
          <div class="concert-date-row">
            <div class="concert-date">${esc(c.date_label)}${esc(dayNight)}${c.format ? '　' + esc(c.format) : ''}</div>
            ${c.photo_url ? `<a class="concert-photo-btn" href="${esc(c.photo_url)}" target="_blank" rel="noopener noreferrer">📷 写真</a>` : ''}
          </div>
          <div class="concert-artist">${esc(artistLabel)}</div>
          <div class="concert-venue">${esc(venueLabel)}</div>
          ${c.performance_name ? `<div class="concert-perf-name" onclick="event.stopPropagation(); this.classList.toggle('expanded')">${esc(c.performance_name)}</div>` : ''}
        </div>
        <div class="setlist-area" id="setlist-${idx}">
          <div class="no-setlist">セットリスト読み込み中...</div>
        </div>
      </div>
    `;
  }

  // ============================================================
  // セットリスト遅延読み込み
  // ============================================================
  const loadingSetlists = new Set(); // 取得中のIDを管理（二重取得防止）

  async function loadSetlist(idx) {
    const c = state.filteredConcerts[idx];
    if (!c) return;

    // ③ メモリキャッシュヒット → 即表示
    if (state.setlistCache[c.id]) {
      renderSetlist(idx, state.setlistCache[c.id]);
      return;
    }

    // ③ localStorageキャッシュヒット → 即表示してバックグラウンドで更新
    const lsKey    = 'lv_setlist_' + c.id;
    const lsCached = localStorage.getItem(lsKey);
    if (lsCached) {
      const parsed = JSON.parse(lsCached);
      state.setlistCache[c.id] = parsed;
      _lvTouchSetlistCache(c.id, false);
      renderSetlist(idx, parsed);
      return; // キャッシュから即表示して終了
    }

    if (loadingSetlists.has(c.id)) return; // 取得中はスキップ
    loadingSetlists.add(c.id);

    try {
      const data = await fetch(GAS_URL + '?action=setlist&liveId=' + encodeURIComponent(c.id))
        .then(r => r.json())
        .then(r => { if (!r.success) throw new Error(r.error); return r.data; });

      // ③ メモリ・localStorageの両方に保存
      state.setlistCache[c.id] = data;
      try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch(e) {}
      _lvTouchSetlistCache(c.id, true);
      renderSetlist(idx, data);

    } catch(e) {
      // エラー時もrenderSetlistを呼んでアーティストタブを表示
      renderSetlist(idx, { setlists: [] });
    } finally {
      loadingSetlists.delete(c.id);
    }
  }

  // ④ バックグラウンドプリフェッチ（前後3件を事前取得）
  function prefetchAround(idx) {
    [-3, -2, -1, 1, 2, 3].forEach(offset => {
      const target = state.filteredConcerts[idx + offset];
      if (!target) return;
      if (state.setlistCache[target.id]) return;
      if (loadingSetlists.has(target.id)) return;
      if (localStorage.getItem('lv_setlist_' + target.id)) return;
      // バックグラウンドで取得（結果は待たない）
      loadSetlist(idx + offset);
    });
  }

  function renderSetlist(idx, data) {
    const el = document.getElementById('setlist-' + idx);
    if (!el) return;

    const c        = state.filteredConcerts[idx];
    const setlists = data ? (data.setlists || []) : [];
    const artists  = c ? (c.artists || []) : [];

    // セトリ未入力（setlists=0件）かつ複数アーティスト → タブのみ表示
    if (setlists.length === 0) {
      if (artists.length > 1) {
        const tabs = artists.map((a, i) =>
          `<div class="artist-tab ${i === 0 ? 'active' : ''}"
                data-artist-id="${a.id}"
                data-setlist-id=""
                onclick="switchArtistTab(this)">${esc(a.name)}</div>`
        ).join('');
        el.innerHTML = `
          <div class="artist-tabs">${tabs}</div>
          <div class="no-setlist">セットリストなし</div>
        `;
      } else {
        // 【バグ③】1バンド公演でセトリ未取得のとき、タップで再読み込みできる導線を出す
        el.innerHTML = `<div class="no-setlist">セットリストなし<br>
          <span style="color:var(--accent);cursor:pointer;text-decoration:underline;font-size:13px;" onclick="_lvReloadSetlist(${idx})">🔄 タップで再読み込み</span></div>`;
      }
      return;
    }

    // 複数アーティストの場合（setlists件数に関わらずartistsが複数ならタブを表示）
    if (artists.length > 1) {
      const tabs = artists.map((a, i) => {
        const sl = setlists.find(s => s.artist_id === a.id);
        return `<div class="artist-tab ${i === 0 ? 'active' : ''}"
              data-artist-id="${a.id}"
              data-setlist-id="${sl ? sl.id : ''}"
              onclick="switchArtistTabPane(${idx}, ${i}, this)">${esc(a.name)}</div>`;
      }).join('');

      // アーティストIDでsetlistを引き当てる
      const panes = artists.map((a, i) => {
        const sl = setlists.find(s => s.artist_id === a.id);
        const content = sl
          ? buildSongList(sl.songs, sl.id, c ? c.id : '')
          : '<div class="no-setlist">セットリストなし</div>';
        return `<div class="setlist-pane" id="pane-${idx}-${i}" style="${i > 0 ? 'display:none' : ''}">${content}</div>`;
      }).join('');

      el.innerHTML = `
        <div class="artist-tabs">${tabs}</div>
        ${panes}
      `;
      return;
    }

    // 1アーティストの場合
    el.innerHTML = buildSongList(setlists[0].songs, setlists[0].id, c ? c.id : '');
  }

  // 【バグ③】「セットリストなし」からの再読み込み（ローカルキャッシュを消してから再取得）
  function _lvReloadSetlist(idx) {
    const c = state.filteredConcerts[idx];
    if (c) {
      delete state.setlistCache[c.id];
      try { localStorage.removeItem('lv_setlist_' + c.id); } catch(e) {}
    }
    loadSetlist(idx);
  }

  // セトリ未入力時のアーティストタブ切り替え（「セットリストなし」表示のまま）
  function switchArtistTab(el) {
    if (state.editMode) return; // 【バグ①同梱】編集中はアーティストタブ切替を無効化
    const tabs = el.closest('.artist-tabs').querySelectorAll('.artist-tab');
    tabs.forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  // 複数アーティストでセトリが一部入力の場合のタブ切り替え
  function switchArtistTabPane(cardIdx, tabIdx, el) {
    if (state.editMode) return; // 【バグ①同梱】編集中はアーティストタブ切替を無効化
    const tabs = el.closest('.artist-tabs').querySelectorAll('.artist-tab');
    tabs.forEach(t => t.classList.remove('active'));
    el.classList.add('active');

    const panes = document.querySelectorAll(`[id^="pane-${cardIdx}-"]`);
    panes.forEach((p, i) => p.style.display = i === tabIdx ? 'block' : 'none');
  }

  function buildSongList(songs, setlistId, liveId) {
    if (!songs || songs.length === 0) {
      return '<div class="no-setlist">曲目なし</div>';
    }

    let html = '<div class="setlist-label">Setlist</div>';
    let trackCounter = 0;
    let hasUnconfirmed = false;

    songs.forEach(s => {
      if (!s.is_encore) trackCounter++;
      const numLabel   = s.track !== null ? s.track : (s.is_encore ? '—' : trackCounter);
      const encoreHtml = s.is_encore ? `<span class="encore-prefix">EN.</span>` : '';
      const cls        = s.is_encore ? 'track-name encore' : 'track-name';

      // 【Ver1.5】未確認フラグONの曲に⚠️マークを表示
      if (s.unconfirmed) hasUnconfirmed = true;
      const warningHtml = s.unconfirmed
        ? `<span class="unconfirmed-mark" onclick="openApproveSongModal('${s.id}','${esc(s.song_name)}','${esc(s.rank||'')}','${esc(s.original_text||'')}',event)">⚠️</span>`
        : '';

      html += `
        <div class="setlist-track">
          <span class="track-num">${numLabel}</span>
          ${warningHtml}
          <span class="${cls}" onclick="openSongEditModal('${s.id}','${esc(s.song_name)}',${s.encore_count||0})">${encoreHtml}${esc(s.song_name)}</span>
        </div>
      `;
    });

    // 【Ver1.5】未確認フラグONの曲がある場合は「全て確認済みにする」ボタンを表示
    if (hasUnconfirmed && setlistId) {
      html += `
        <div class="approve-all-btn-area">
          <button class="approve-all-btn" onclick="approveAll('${setlistId}','${liveId||''}')">
            ✅ 全て確認済みにする
          </button>
        </div>
      `;
    }

    return html;
  }

  function switchSetlistTab(cardIdx, tabIdx, el) {
    const tabs = el.closest('.artist-tabs').querySelectorAll('.artist-tab');
    tabs.forEach(t => t.classList.remove('active'));
    el.classList.add('active');

    const panes = document.querySelectorAll(`[id^="pane-${cardIdx}-"]`);
    panes.forEach((p, i) => p.style.display = i === tabIdx ? 'block' : 'none');
  }

  // ============================================================
  // iOSスワイプ戻る/進むジェスチャーを無効化
  // ============================================================
  document.addEventListener('touchstart', (e) => {
    const x = e.touches[0].pageX;
    if (x <= 20 || x >= window.innerWidth - 20) {
      e.preventDefault();
    }
  }, { passive: false });

  // ============================================================
  // iOS 長押しメニュー対策（contextmenu制御）
  // ============================================================
  document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
  }, { passive: false });

  // ブラウザ履歴を固定（popstateによるリロード防止）
  history.replaceState(null, '', location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', location.href);
  });

  // ============================================================
  // スワイパー
  // ============================================================
  let touchStartX = 0, touchStartY = 0;

  const swiper = document.getElementById('swiper');
  swiper.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  swiper.addEventListener('touchend', e => {
    if (state.editMode || _isModalOpen()) return; // 編集モード中・モーダル表示中はスワイプ無効
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      closeLightbox();
      if (dx < 0) goTo(state.currentIdx + 1);
      else        goTo(state.currentIdx - 1);
    }
  }, { passive: true });

  function goTo(idx) {
    if (idx < 0 || idx >= state.filteredConcerts.length) return;
    state.currentIdx = idx;
    document.getElementById('track').style.transform = `translateX(-${idx * 100}%)`;
    document.getElementById('counter').textContent = `${idx + 1} / ${state.filteredConcerts.length}`;
    loadSetlist(idx);
    // ④ 前後3件をバックグラウンドでプリフェッチ
    prefetchAround(idx);
  }

  // ============================================================
  // フィルター
  // ============================================================
  function renderFilters() {
    const bar      = document.getElementById('filter-bar');
    const years    = state.years.length > 0 ? state.years : [...new Set(state.concerts.map(c => c.date ? c.date.slice(0, 4) : '').filter(Boolean))].sort().reverse();
    let html = `<div class="filter-chip active" onclick="applyFilter('all', null, this)">すべて</div>`;
    years.forEach(y => html += `<div class="filter-chip" onclick="applyFilter('year', '${y}', this)">${y}年</div>`);

    bar.innerHTML = html;
  }

  async function applyFilter(type, value, el) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');

    if (type === 'all') {
      state.filters = { artist: null, year: null, prefecture: null };
      state.currentFilterYear = String(new Date().getFullYear());
      state.concerts = state.concertsByYear[state.currentFilterYear] || [];
    } else if (type === 'year') {
      state.filters.year      = value;
      state.currentFilterYear = value;

      // 未取得の年は3段階（メモリ→localStorage→API）で取得
      if (!state.concertsByYear[value]) {
        showToast('⏳ ' + value + '年のデータを取得中...', { persistent: true });
        await _ensureYearConcerts(value);
        hideToast();
        if (!state.concertsByYear[value]) {
          // 取得失敗（_ensureYearConcertsは失敗時メモリに入らない）→ その場で再試行できるようにする
          showToast('❌ ' + value + '年のデータ取得に失敗しました', {
            persistent: true,
            action:     '🔁 再試行',
            onAction:   function() { applyFilter('year', value, el); }
          });
          return;
        }
      }
      state.concerts = state.concertsByYear[value];
    } else if (type === 'pref') {
      state.filters.prefecture = value;
    } else if (type === 'artist') {
      state.filters.artist = value;
    }

    state.setlistCache = {};
    renderConcerts();

    // フィルター別の初期表示位置
    const today = new Date().toISOString().slice(0, 10);
    if (type === 'all' || type === 'artist') {
      // すべて・アーティスト → 本日に最も近い公演
      goTo(_findNearestIdx(state.filteredConcerts, today));
    } else if (type === 'year') {
      const currentYear = new Date().getFullYear();
      const selectedYear = parseInt(value);
      if (selectedYear < currentYear) {
        // 過去年 → その年の最初の公演（先頭）
        goTo(0);
      } else if (selectedYear > currentYear) {
        // 未来年 → その年の最初の公演（先頭）
        goTo(0);
      } else {
        // 当年 → 本日に最も近い公演
        goTo(_findNearestIdx(state.filteredConcerts, today));
      }
    } else {
      goTo(0);
    }
  }

  function filterConcerts(concerts) {
    return concerts.filter(c => {
      if (c.status === 'キャンセル') return false; // 【バグ⑦】キャンセル公演は一覧に出さない
      if (state.filters.year && (!c.date || !c.date.startsWith(state.filters.year))) return false;
      if (state.filters.prefecture && c.prefecture !== state.filters.prefecture) return false;
      if (state.filters.artist && !c.artists.some(a => a.name === state.filters.artist)) return false;
      return true;
    });
  }

  // ============================================================
  // ライトボックス
  // ============================================================
  function openLightbox(idx) {
    const c   = state.filteredConcerts[idx];
    const lb  = document.getElementById('lightbox');
    const cnt = document.getElementById('lb-content');

    const artistId2 = c.artists.length > 0 ? c.artists[0].id : '';
    const names2    = esc(c.artists.map(a => a.name).join(' / '));
    const lbPh = `
        <div class="lightbox-ph">
          <div class="lightbox-ph-icon">🎸</div>
          <div class="lightbox-ph-name">${names2}</div>
        </div>`;
    if (c.has_poster && c.poster_url) {
      cnt.innerHTML = `<img src="${c.poster_url}" alt="ポスター">`;
    } else if (artistId2) {
      // 演者画像はGitHub Pagesを直接参照。無い場合(404)はプレースホルダーへ差し替える
      const url = 'https://taroh3.github.io/live-management/live_artist_' + artistId2.replace(/-/g, '') + '.jpg';
      cnt.innerHTML = `<img src="${url}" alt="${names2}">`;
      const lbImg = cnt.querySelector('img');
      if (lbImg) lbImg.onerror = function() { cnt.innerHTML = lbPh; };
    } else {
      cnt.innerHTML = lbPh;
    }

    lb.classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }

  // ============================================================
  // 修正モーダル（長押し検知）【Ver1.5更新】
  // ============================================================
  let longPressTimer = null;

  document.addEventListener('touchstart', e => {
    // タブタップ時は長押し検知しない（タブのonclickを優先）
    if (e.target.closest('.artist-tab')) return;

    if (e.target.closest('.poster-area')) {
      longPressTimer = setTimeout(() => {
        _modalJustOpened = true;
        setTimeout(() => { _modalJustOpened = false; }, 600);
        openPosterMenu();
      }, 600);
    } else if (e.target.closest('.concert-info')) {
      longPressTimer = setTimeout(() => {
        _modalJustOpened = true;
        setTimeout(() => { _modalJustOpened = false; }, 600);
        openEditConcert();
      }, 600);
    } else if (e.target.closest('.setlist-area')) {
      longPressTimer = setTimeout(() => {
        _modalJustOpened = true;
        setTimeout(() => { _modalJustOpened = false; }, 600);
        openSetlistMenu();
      }, 600);
    }
  }, { passive: true });

  // 指が離れたらタイマーキャンセル
  document.addEventListener('touchend', () => {
    clearTimeout(longPressTimer);
  });

  // 指が動いたらタイマーキャンセル（スクロール中の誤発火防止）
  document.addEventListener('touchmove', () => {
    clearTimeout(longPressTimer);
  }, { passive: true });

  // ============================================================
  // 【Ver1.5新規】ポスター写真メニュー
  // ============================================================
  function openPosterMenu() {
    const c = state.filteredConcerts[state.currentIdx];
    if (!c) return;
    if (!navigator.onLine) { showToast('オフライン中は修正できません'); return; }
    _lvSetPendingTarget(); // バグ⑤: この時点で対象公演を確定

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-section-title">ポスター写真</div>
      <div class="edit-btn-group">
        <button class="edit-btn" onclick="triggerPosterUpload()">➕ ポスター写真を追加</button>
        <button class="edit-btn" onclick="closeModal()">戻る</button>
      </div>
    `;
    openModal();
  }

  function triggerPosterUpload() {
    closeModal();
    const input    = document.createElement('input');
    input.type     = 'file';
    input.accept   = 'image/*';
    input.multiple = true;
    input.onchange = e => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      showPosterPreview(files);
    };
    input.click();
  }

  function showPosterPreview(files) {
    const previews = files.map(f =>
      `<img src="${URL.createObjectURL(f)}" class="preview-img" alt="プレビュー">`
    ).join('');
    const t    = state._pendingTarget;
    const dest = t ? `<div style="font-size:12px;color:var(--text-sub);text-align:center;margin:6px 0;">保存先: ${esc(t.dateLabel)}${t.venue ? ' / ' + esc(t.venue) : ''}</div>` : '';
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-section-title">ポスター写真を追加</div>
      ${dest}
      <div class="preview-grid">${previews}</div>
      <div class="preview-count">${files.length}枚選択中</div>
      <div class="edit-btn-group">
        <button class="edit-btn edit-btn-primary" onclick="uploadPosterFiles()">📤 ${files.length}枚を送信する</button>
        <button class="edit-btn" onclick="closeModal()">キャンセル</button>
      </div>
    `;
    openModal();
    state._pendingPosterFiles = files;
  }

  async function uploadPosterFiles() {
    const t     = state._pendingTarget;
    const files = state._pendingPosterFiles || [];
    if (!files.length || !t) return;
    closeModal();
    const year  = t.year || String(new Date().getFullYear());
    let successCount = 0;
    for (let i = 0; i < files.length; i++) {
      try {
        showToast(`📤 送信中 ${i+1}/${files.length}...`);
        const b64 = await fileToBase64(files[i]);
        await apiPost('lv_upload_poster', {
          liveId: t.liveId, imageBase64: b64,
          fileName: files[i].name, mimeType: files[i].type || 'image/jpeg',
          year: year,
        });
        successCount++;
        await new Promise(r => setTimeout(r, 500));
      } catch(e) { showToast('❌ 送信失敗: ' + e.message); }
    }
    if (successCount > 0) {
      showToast(`✅ ${successCount}枚のポスター写真を追加しました`);
      delete state.concertsByYear[year];
      localStorage.removeItem('lv_concerts_' + year);
    }
    state._pendingPosterFiles = null;
  }

  // ============================================================
  // 【Ver1.5新規】セトリメニュー
  // ============================================================
  function openSetlistMenu() {
    const c = state.filteredConcerts[state.currentIdx];
    if (!c) return;
    if (!navigator.onLine) { showToast('オフライン中は修正できません'); return; }
    _lvSetPendingTarget(); // バグ⑤: この時点で対象公演を確定

    const setlistData   = state.setlistCache[c.id];
    const setlists      = setlistData ? (setlistData.setlists || []) : [];
    const activeSetlist = _getActiveSetlist(c.id, setlists);
    const setlistId     = activeSetlist ? activeSetlist.id       : null;
    const artistId      = activeSetlist ? activeSetlist.artistId : null;
    const hasSongs      = activeSetlist ? (activeSetlist.songs && activeSetlist.songs.length > 0) : false;

    // セトリ未登録でもartistIdがあれば①②③は有効（GAS側でNotionを検索・新規作成）
    const canOperate = artistId !== null;

    // ③解析ボタン：GAS側でsetlistIdを検索するためartistIdがあれば常に有効
    // setlistIdとartistIdの両方をGASに渡す（LINEメニューと同じ設計）
    const analyzeBtn = canOperate
      ? `<button class="edit-btn edit-btn-primary" onclick="startSetlistAnalysis('${setlistId || ''}','${artistId || ''}','${c.id}')">🔍 ③ セトリ解析</button>`
      : `<button class="edit-btn" style="opacity:0.5">🔍 ③ セトリ解析</button>`;

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-section-title">セトリメニュー</div>
      <div class="edit-btn-group">
        ${canOperate
          ? `<button class="edit-btn" onclick="triggerSetlistImageUpload('${setlistId || ''}','${artistId || ''}')">📸 ① セトリ写真アップ</button>`
          : `<button class="edit-btn" style="opacity:0.5">📸 ① セトリ写真アップ</button>`}
        ${canOperate
          ? `<button class="edit-btn" onclick="openSetlistNoteInput('${setlistId || ''}','${artistId || ''}')">✍️ ② セトリ補足入力</button>`
          : `<button class="edit-btn" style="opacity:0.5">✍️ ② セトリ補足入力</button>`}
        ${analyzeBtn}
        ${!editSetlistState.active
          ? `<button class="edit-btn" onclick="refreshSetlistData('${c.id}')">🔄 ④ セトリ更新</button>`
          : `<button class="edit-btn" style="opacity:0.4;pointer-events:none;cursor:not-allowed" title="修正完了後に使用可能です">🔄 ④ セトリ更新</button>`

  // 現在アクティブなタブのセットリストを返す
  function _getActiveSetlist(liveId, setlists) {
    const idx       = state.currentIdx;
    const card      = document.getElementById('setlist-' + idx);
    const activeTab = card ? card.querySelector('.artist-tab.active') : null;

    if (activeTab) {
      const setlistId = activeTab.dataset.setlistId || null;
      const artistId  = activeTab.dataset.artistId  || null;
      if (!setlistId) {
        // セトリ未登録だがartistIdは返す
        return { id: null, artistId };
      }
      const found = setlists ? setlists.find(sl => sl.id === setlistId) : null;
      return found
        ? { ...found, artistId: found.artist_id || artistId }
        : { id: setlistId, artistId };
    }

    // タブなし（1アーティスト）
    if (setlists && setlists.length === 1) {
      return { ...setlists[0], artistId: setlists[0].artist_id || null };
    }
    // 【バグ③】タブなし＆セトリ0件でも、1アーティスト公演ならその演者IDを返して①②③を有効化する
    const c = state.filteredConcerts[state.currentIdx];
    if (c && c.artists && c.artists.length === 1) {
      return { id: null, artistId: c.artists[0].id };
    }
    return { id: null, artistId: null };
  }

  // セトリ解析実行
  async function startSetlistAnalysis(setlistId, artistId, liveId) {
    closeModal();

    // 対象セトリの現状（曲数・写真有無）を把握する
    const cacheData = state.setlistCache[liveId];
    const sls = cacheData ? (cacheData.setlists || []) : [];
    const sl  = setlistId ? sls.find(s => s.id === setlistId) : (sls.length === 1 ? sls[0] : null);
    const songCount = (sl && sl.songs) ? sl.songs.length : 0;
    const hasPhoto  = sl ? !!sl.has_photo : false;

    // 【再解析整理②】写真なし＆既存曲あり → 補足だけの「全消し再解析」で本物のセトリが消えるため中止
    if (!hasPhoto && songCount > 0) {
      showToast('⚠️ 写真がないため、③解析すると既存の曲が消えます。補足で既存を直す場合は③解析は使えません。');
      return;
    }

    // 【バグ④】既存曲がある場合は事前確認（全消し→再解析になる旨を明示）
    if (songCount > 0) {
      const ok = window.confirm('登録済みの' + songCount + '曲を削除して再解析します（確認済み状態も消えます）。よろしいですか？');
      if (!ok) return;
    }

    try {
      showToast('🔍 解析を開始します...');
      await apiPost('lv_analyze', {
        setlistId: setlistId || null,
        artistId:  artistId  || null,
        liveId:    liveId    || null,
        userId:    null,
      });
      showToast('✅ 解析を開始しました。完了後に自動更新します。');
      _startAnalysisPolling(setlistId, liveId, artistId);
    } catch(e) { showToast('❌ ' + e.message); }
  }

  // 解析完了ポーリング（5秒間隔・最大60回＝5分でタイムアウト）
  let _pollingTimer = null;
  function _startAnalysisPolling(setlistId, liveId, artistId) {
    if (_pollingTimer) clearInterval(_pollingTimer);
    let attempts = 0;
    _pollingTimer = setInterval(async () => {
      attempts++;
      if (attempts > 60) {
        clearInterval(_pollingTimer); _pollingTimer = null;
        showToast('⚠️ 解析に時間がかかっています。後ほど更新ボタンで確認してください。');
        return;
      }
      try {
        // キャッシュを使わず直接fetchでステータスを取得
        const url = new URL(GAS_URL);
        url.searchParams.set('action', 'lv_analysis_status');
        if (setlistId) url.searchParams.set('setlistId', setlistId);
        if (liveId)    url.searchParams.set('liveId',    liveId);
        if (artistId)  url.searchParams.set('artistId',  artistId);
        const res    = await fetch(url.toString());
        const json   = await res.json();
        if (!json.success) return;
        const result = json.data;

        // setlistIdが不明だった場合はここで取得
        if (!setlistId && result.setlistId) setlistId = result.setlistId;

        if (result && result.is_complete) {
          clearInterval(_pollingTimer); _pollingTimer = null;
          if (liveId) {
            delete state.setlistCache[liveId];
            localStorage.removeItem('lv_setlist_' + liveId);
            const cur = state.filteredConcerts[state.currentIdx];
            if (cur && cur.id === liveId) await loadSetlist(state.currentIdx);
          }
          showToast('✅ 解析完了！セトリを確認してください。');
        }
      } catch(e) {}
    }, 5000);
  }

  // ファイルをbase64に変換
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('ファイル読み込み失敗'));
      reader.readAsDataURL(file);
    });
  }

  // 編集モードの状態
  const editSetlistState = {
    active:       false,
    liveId:       null,
    setlistId:    null,
    songs:        [],        // 編集中の曲配列（ローカル）
    originalSongs: [],       // 元の曲配列（キャンセル用）
