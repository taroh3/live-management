  function openEditSetlist() {
    const c = state.filteredConcerts[state.currentIdx];
    if (!c) return;

    const cached = state.setlistCache && state.setlistCache[c.id];
    if (!cached || !cached.setlists || cached.setlists.length === 0) {
      showToast('セットリストが読み込まれていません');
      return;
    }

    const idx      = state.currentIdx;
    const setlists = cached.setlists;

    // タブ位置番号は「編集ペインの特定」にのみ使う（ペインはタブと同順で生成される）
    let activeSlIdx = 0;
    if (setlists.length > 1) {
      const tabs = document.querySelectorAll(`#setlist-${idx} .artist-tab`);
      tabs.forEach((t, i) => { if (t.classList.contains('active')) activeSlIdx = i; });
    }

    // 【バグ①】編集対象セトリは位置番号ではなく、アクティブタブのdata属性で正しく引き当てる
    // （setlists配列の並びはタブ順と無関係なため、位置番号での引き当ては別バンドを掴み得る）
    const active = _getActiveSetlist(c.id, setlists);
    if (!active || !active.id) {
      showToast('このアーティストのセトリは未登録です');
      return;
    }
    const sl = setlists.find(s => s.id === active.id) || active;

    const paneId = setlists.length > 1
      ? `pane-${idx}-${activeSlIdx}`
      : `setlist-${idx}`;
    const paneEl = document.getElementById(paneId);

    // 状態を設定
    editSetlistState.active        = true;
    editSetlistState.liveId        = c.id;
    editSetlistState.setlistId     = sl.id;
    editSetlistState.songs         = sl.songs.map(s => ({ ...s, original_track: s.track }));
    editSetlistState.originalSongs = sl.songs.map(s => ({ ...s }));
    editSetlistState.paneEl        = paneEl;

    // スワイプロック
    state.editMode = true;

    renderEditSetlist();
  }

  function renderEditSetlist() {
    const el    = editSetlistState.paneEl;
    const songs = editSetlistState.songs;
    if (!el) return;

    // セクション分け（本編・アンコール1・アンコール2）
    const mainSongs    = songs.filter(s => s.encore_count === 0);
    const encore1Songs = songs.filter(s => s.encore_count === 1);
    const encore2Songs = songs.filter(s => s.encore_count === 2);

    const buildRows = (sectionSongs, globalStart) => {
      return sectionSongs.map((s, localIdx) => {
        const globalIdx = songs.indexOf(s);
        const isFirst   = globalIdx === 0 || songs.slice(0, globalIdx).every(x => x.encore_count !== s.encore_count);
        const isLast    = globalIdx === songs.length - 1 || songs.slice(globalIdx + 1).every(x => x.encore_count !== s.encore_count);
        const upDisabled   = isFirst  ? 'disabled' : '';
        const downDisabled = isLast   ? 'disabled' : '';

        return `
          <div class="edit-song-row" data-idx="${globalIdx}">
            <div class="edit-song-controls">
              <button class="edit-arrow-btn" ${upDisabled} onclick="moveSong(${globalIdx}, -1)">↑</button>
              <button class="edit-arrow-btn" ${downDisabled} onclick="moveSong(${globalIdx}, 1)">↓</button>
            </div>
            <span class="edit-song-num">${s.track !== null ? s.track : '—'}</span>
            <span class="edit-song-name" onclick="openSongEdit(${globalIdx})">${esc(s.song_name)}</span>
            <button class="edit-delete-btn" onclick="deleteSong(${globalIdx})">✕</button>
          </div>
        `;
      }).join('');
    };

    let html = '<div class="edit-setlist-wrapper">';

    if (mainSongs.length > 0) {
      html += `<div class="edit-section-label">本編</div>`;
      html += buildRows(mainSongs);
    }
    if (encore1Songs.length > 0) {
      html += `<div class="edit-section-label">アンコール 1</div>`;
      html += buildRows(encore1Songs);
    }
    if (encore2Songs.length > 0) {
      html += `<div class="edit-section-label">アンコール 2</div>`;
      html += buildRows(encore2Songs);
    }

    html += `
      <button class="edit-add-btn" onclick="openAddSong()">＋ 曲を追加</button>
      <div style="font-size:12px;color:var(--text-sub);line-height:1.5;margin:8px 4px;">ⓘ 曲の編集・追加・削除は即時保存されます。↑↓の並び替えは「並び順を保存」で確定してください。</div>
      <div class="edit-action-buttons">
        <button class="modal-save-btn" onclick="saveSetlistOrder()">並び順を保存</button>
        <button class="modal-cancel-btn" onclick="cancelEditSetlist()">閉じる</button>
      </div>
    </div>`;

    el.innerHTML = html;
  }

  // 曲を上下に移動（同セクション内のみ）
  function moveSong(idx, dir) {
    const songs   = editSetlistState.songs;
    const target  = songs[idx];
    const swapIdx = idx + dir;
    if (swapIdx < 0 || swapIdx >= songs.length) return;
    if (songs[swapIdx].encore_count !== target.encore_count) return; // セクション越え不可

    // 配列内の位置を入れ替え
    [songs[idx], songs[swapIdx]] = [songs[swapIdx], songs[idx]];

    // track番号を振り直す（セクション別に1から採番）
    renumberTracks();
    renderEditSetlist();
  }

  // track番号を振り直す（本編・アンコール1・アンコール2 それぞれ1から）
  function renumberTracks() {
    const songs    = editSetlistState.songs;
    const counters = { 0: 0, 1: 0, 2: 0 };
    songs.forEach(s => {
      counters[s.encore_count] = (counters[s.encore_count] || 0) + 1;
      s.track = counters[s.encore_count];
    });
  }

  // 1曲編集モーダル（セトリ編集モード内のタップ）
  function openSongEdit(idx) {
    const s = editSetlistState.songs[idx];
    if (!s) return;

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-title">✏️ 曲を編集</div>
      <div class="modal-item">
        <div class="modal-label">曲名</div>
        <input class="modal-input" type="text" id="song-edit-name" value="${esc(s.song_name)}">
      </div>
      <div class="modal-item">
        <div class="modal-label">アンコール区分</div>
        <select class="modal-select" id="song-edit-encore">
          <option value="0" ${s.encore_count === 0 ? 'selected' : ''}>本編</option>
          <option value="1" ${s.encore_count === 1 ? 'selected' : ''}>アンコール 1</option>
          <option value="2" ${s.encore_count === 2 ? 'selected' : ''}>アンコール 2</option>
        </select>
      </div>
      <button class="modal-save-btn" onclick="saveSongEdit(${idx})">保存する</button>
      <button class="edit-delete-song-btn" onclick="deleteSong(${idx}, true)">この曲を削除</button>
      <button class="modal-cancel-btn" onclick="closeModal()">キャンセル</button>
    `;
    openModal();
  }

  async function saveSongEdit(idx) {
    const s        = editSetlistState.songs[idx];
    const songName = document.getElementById('song-edit-name').value.trim();
    const encore   = parseInt(document.getElementById('song-edit-encore').value, 10);

    if (!songName) { showToast('曲名を入力してください'); return; }

    try {
      await apiPost('edit_setlist', {
        edit_type:    'edit_song',
        liveId:       editSetlistState.liveId,
        setlistId:    editSetlistState.setlistId,
        song_id:      s.id,
        song_name:    songName,
        encore_count: encore,
      });

      // ローカルを更新
      s.song_name    = songName;
      s.encore_count = encore;
      s.is_encore    = encore > 0;
      closeModal();
      renumberTracks();
      // 【バグ⑭】区分変更で再採番された曲順を、その場でNotionへ自動追送（保存し忘れ対策）
      await _lvPersistTrackChanges();
      renderEditSetlist();

      // 【修正】セットリストキャッシュをクリア（編集モードを抜けた後に古い表示が残る不具合対策）
      if (state.setlistCache) delete state.setlistCache[editSetlistState.liveId];
      localStorage.removeItem('lv_setlist_' + editSetlistState.liveId);
    } catch(e) {
      showToast('❌ 保存失敗: ' + e.message);
    }
  }

  // 曲の削除
  async function deleteSong(idx, fromModal = false) {
    const s = editSetlistState.songs[idx];
    if (!s) return;

    try {
      await apiPost('edit_setlist', {
        edit_type: 'delete_song',
        liveId:    editSetlistState.liveId,
        setlistId: editSetlistState.setlistId,
        song_id:   s.id,
      });

      // ローカル配列から除去
      editSetlistState.songs.splice(idx, 1);
      renumberTracks();
      // 【バグ⑭】削除で繰り上がった曲順をその場でNotionへ自動追送
      await _lvPersistTrackChanges();
      if (fromModal) closeModal();
      renderEditSetlist();
      showToast('🗑️ 削除しました');

      // 【修正】セットリストキャッシュをクリア（編集モードを抜けた後に削除前の表示が残る不具合対策）
      if (state.setlistCache) delete state.setlistCache[editSetlistState.liveId];
      localStorage.removeItem('lv_setlist_' + editSetlistState.liveId);
    } catch(e) {
      showToast('❌ 削除失敗: ' + e.message);
    }
  }

  // 曲の追加
  function openAddSong() {
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-title">＋ 曲を追加</div>
      <div class="modal-item">
        <div class="modal-label">曲名</div>
        <input class="modal-input" type="text" id="add-song-name" placeholder="曲名を入力">
      </div>
      <div class="modal-item">
        <div class="modal-label">アンコール区分</div>
        <select class="modal-select" id="add-song-encore">
          <option value="0">本編</option>
          <option value="1">アンコール 1</option>
          <option value="2">アンコール 2</option>
        </select>
      </div>
      <button class="modal-save-btn" onclick="addSong()">追加する</button>
      <button class="modal-cancel-btn" onclick="closeModal()">キャンセル</button>
    `;
    openModal();
  }

  async function addSong() {
    const songName = document.getElementById('add-song-name').value.trim();
    const encore   = parseInt(document.getElementById('add-song-encore').value, 10);

    if (!songName) { showToast('曲名を入力してください'); return; }

    // 該当アンコール区分の末尾のtrack番号を計算
    const sameSection = editSetlistState.songs.filter(s => s.encore_count === encore);
    const nextTrack   = sameSection.length + 1;

    try {
      const res = await apiPost('edit_setlist', {
        edit_type:    'add_song',
        liveId:       editSetlistState.liveId,
        setlistId:    editSetlistState.setlistId,
        song_name:    songName,
        track:        nextTrack,
        encore_count: encore,
      });

      // ローカルに追加
      editSetlistState.songs.push({
        id:             res && res.song_id ? res.song_id : 'temp_' + Date.now(),
        song_name:      songName,
        track:          nextTrack,
        encore_count:   encore,
        is_encore:      encore > 0,
        original_track: null,
        rank:           'A',
        unconfirmed:    true,
      });

      closeModal();
      renumberTracks();
      // 【バグ⑭】追加による採番変化をその場でNotionへ自動追送
      await _lvPersistTrackChanges();
      renderEditSetlist();
      showToast('✅ 追加しました');

      // 【修正】セットリストキャッシュをクリア（編集モードを抜けた後に追加前の表示が残る不具合対策）
      if (state.setlistCache) delete state.setlistCache[editSetlistState.liveId];
      localStorage.removeItem('lv_setlist_' + editSetlistState.liveId);
    } catch(e) {
      showToast('❌ 追加失敗: ' + e.message);
    }
  }

  // 【バグ⑭】再採番でtrackが変わった曲をNotionへ自動追送する（差分のみ）。
  // 曲の編集・削除・追加の直後に呼び、区分変更や削除による採番ズレの「保存し忘れ」を防ぐ。
  async function _lvPersistTrackChanges() {
    const songs = editSetlistState.songs;
    const changed = songs
      .filter(s => s.track !== s.original_track)
      .filter(s => !String(s.id).startsWith('temp_')) // 楽曲マスタ未登録の仮IDはスキップ
      .map(s => ({ song_id: s.id, track: s.track, original_track: s.original_track }));
    if (changed.length === 0) return;
    await apiPost('edit_setlist', {
      edit_type: 'reorder_songs',
      liveId:    editSetlistState.liveId,
      setlistId: editSetlistState.setlistId,
      songs:     changed,
    });
    // 追送済みなので基準（original_track）を現在値に更新（次の差分で二重送信しない）
    songs.forEach(s => { s.original_track = s.track; });
  }

  // 並び替えを保存（差分のみ送信）
  async function saveSetlistOrder() {
    try {
      await _lvPersistTrackChanges();

      // キャッシュクリア
      if (state.setlistCache) delete state.setlistCache[editSetlistState.liveId];
      localStorage.removeItem('lv_setlist_' + editSetlistState.liveId);

      exitEditSetlist();
      // セットリストを再読み込み
      loadSetlist(state.currentIdx);
      state.statsData = null; // 修正後は統計を取り直す（課題⑤）
      showToast('✅ 並び順を保存しました');
    } catch(e) {
      showToast('❌ 保存失敗: ' + e.message);
    }
  }

  // キャンセル（変更破棄）
  function cancelEditSetlist() {
    exitEditSetlist();
    // 元のセットリストを再描画
    loadSetlist(state.currentIdx);
  }

  function exitEditSetlist() {
    state.editMode                = false;
    editSetlistState.active       = false;
    editSetlistState.liveId       = null;
    editSetlistState.setlistId    = null;
    editSetlistState.songs        = [];
    editSetlistState.originalSongs = [];
    editSetlistState.paneEl       = null;
  }

  // 【バグ⑤】書き込み対象を「操作開始時」に確定し、送信時に表示中カードから再解決しない
  function _lvSetPendingTarget(extra) {
    const c = state.filteredConcerts[state.currentIdx];
    if (!c) { state._pendingTarget = null; return null; }
    state._pendingTarget = Object.assign({
      liveId:    c.id,
      year:      c.date ? c.date.slice(0, 4) : '',
      dateLabel: c.date_label || '',
      venue:     c.venue ? c.venue.name : ''
    }, extra || {});
    return state._pendingTarget;
  }
  function _isModalOpen() {
    const m = document.getElementById('modal-overlay');
    return !!(m && m.classList.contains('active'));
  }

  function openModal() {
    document.getElementById('modal-overlay').classList.add('active');
  }

  // 【Ver1.5】長押し後のclickイベントによる即時クローズを防ぐフラグ
  let _modalJustOpened = false;

  function closeModal(e) {
    if (_modalJustOpened) return; // 長押し直後のclickは無視
    if (e && e.target !== document.getElementById('modal-overlay')) return;
    document.getElementById('modal-overlay').classList.remove('active');
  }

  // ============================================================
  // 演者一覧
  // ============================================================
  function _computeStatsFromConcerts(tab) {
    // 手持ちの全公演を結合（重複排除）
    const seen = {};
    const all  = [];
    Object.values(state.concertsByYear || {}).forEach(arr => {
      (arr || []).forEach(c => {
        if (c && c.id && !seen[c.id]) { seen[c.id] = true; all.push(c); }
      });
    });
    if (all.length === 0) return null;

    const today = new Date().toISOString().slice(0, 10);
    let attended = 0, planned = 0;

    all.forEach(c => {
      if (c.status === 'キャンセル') return;
      const year = (c.date || '').slice(0, 4);
      if (!year) return;
      if (tab !== 'all' && year !== tab) return;

      planned++;
      if (c.date <= today) attended++;
    });

    return { attended: attended, planned: planned };
  }

  function renderArtists() {
    const tab = state.currentArtistTab; // 'all' または年文字列

    // --- 年タブ描画 ---
    const tabsEl = document.getElementById('artist-year-tabs');
    if (tabsEl) {
      const tabList = ['all'].concat(state.artistYears || []);
      tabsEl.innerHTML = tabList.map(t => {
        const label  = (t === 'all') ? 'すべて' : (t + '年');
        const active = (t === tab) ? ' active' : '';
        return `<div class="artist-year-tab${active}" onclick="switchArtistYearTab('${t}')">${label}</div>`;
      }).join('');
    }

    // --- 各アーティストの「左の数値・右の数値」を算出 ---
    const rows = (state.artists || []).map(a => {
      let attended, planned;
      if (tab === 'all') {
        attended = a.total_attended || 0;
        planned  = a.total_planned  || 0;
      } else {
        attended = (a.by_year         && a.by_year[tab])         || 0;
        planned  = (a.by_year_planned && a.by_year_planned[tab]) || 0;
      }
      return { artist: a, attended: attended, planned: planned };
    });

    // --- 並び順：選択タブの「全参戦予定（分母）」が多い順（仕様書5.10）---
    const visible = (tab === 'all')
      ? rows
      : rows.filter(r => r.planned > 0);
    visible.sort((a, b) => b.planned - a.planned);

    // --- 上部統計（仕様書5.4）：公演単位の実数（対バン重複なし）---
    const stats = state.artistStats || {};
    let stat = (tab === 'all') ? stats.all : stats[tab];

    // statsが未取得（旧キャッシュ等）の場合は手持ちの公演から再計算
    if (!stat || (stat.attended === 0 && stat.planned === 0)) {
      const computed = _computeStatsFromConcerts(tab);
      if (computed) stat = computed;
    }
    stat = stat || { attended: 0, planned: 0 };

    const statAttended = stat.attended || 0;
    const statPlanned  = stat.planned  || 0;
    const statBar = document.getElementById('artist-stat-bar');
    if (statBar) {
      statBar.innerHTML =
        `<span class="artist-stat-label">参戦本数:</span>` +
        `<span class="artist-stat-num">${statAttended}</span>` +
        `<span class="artist-stat-sep">/</span>` +
        `<span class="artist-stat-num">${statPlanned}</span>` +
        `<span class="artist-stat-label">本</span>`;
    }

    // --- アーティスト一覧 ---
    const list = document.getElementById('artist-list');
    list.innerHTML = visible.map(r => {
      const a = r.artist;
      return `
      <div class="artist-item" onclick="goToArtist('${a.id}')">
        <div class="artist-icon">
          ${a.default_img_url
            ? `<img src="${a.default_img_url}" alt="${esc(a.name)}">`
            : '👤'}
        </div>
        <div class="artist-info">
          <div class="artist-item-name">${esc(a.name)}</div>
        </div>
        <div class="artist-item-count"><span class="num-attended">${r.attended}</span>/${r.planned}本</div>
      </div>
    `;
    }).join('');
  }

  function switchArtistYearTab(tab) {
    state.currentArtistTab = tab;
    renderArtists();
  }

  async function _ensureYearConcerts(year) {
    // ① メモリ
    if (state.concertsByYear[year]) return state.concertsByYear[year];
    // ② localStorage（前回取得分を再利用。ヒット時はメモリにも復元する）
    try {
      const cached = localStorage.getItem('lv_concerts_' + year);
      if (cached) {
        const data = JSON.parse(cached);
        state.concertsByYear[year] = data;
        return data;
      }
    } catch(e) {}
    // ③ GAS API
    try {
      const data = await apiGet('concerts', { year: year });
      state.concertsByYear[year] = data;
      _lvSafeSetItem('lv_concerts_' + year, JSON.stringify(data));
      return data;
    } catch(e) {
      return [];
    }
  }

  async function _ensureAllYearsConcerts() {
    const years = (state.years && state.years.length > 0)
      ? state.years
      : Object.keys(state.concertsByYear);
    // Notion API 429対策として、同時取得は最大3本に制限しつつ並列化する
    const CONCURRENCY = 3;
    const byYear = {};
    for (let i = 0; i < years.length; i += CONCURRENCY) {
      const batch = years.slice(i, i + CONCURRENCY);
      const datas = await Promise.all(batch.map(y => _ensureYearConcerts(y)));
      batch.forEach((y, j) => { byYear[y] = datas[j] || []; });
    }
    const all = [];
    years.forEach(y => { all.push(...(byYear[y] || [])); });
    all.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    return all;
  }

  // 【Ver2.8】演者名タップ → 中間一覧（対象1件ならカード直行）
  async function goToArtist(artistId) {
    const artist = (state.artists || []).find(a => a.id === artistId);
    if (!artist) return;
    const artistTab = state.currentArtistTab; // 'all' または年文字列

    // 対象年の公演データを確保（キャッシュ利用）
    showToast('⏳ 公演データを取得中...', { persistent: true });
    try {
      if (artistTab === 'all') await _ensureAllYearsConcerts();
      else                     await _ensureYearConcerts(artistTab);
    } finally {
      hideToast();
    }

    // その演者の対象公演（キャンセル除外・古い順）
    const list = _lvArtistConcerts(artist.name, artistTab);

    if (list.length <= 1) {
      // 1件（以下）なら中間一覧を挟まずカードへ直行（通常経路＝戻るボタンなし）
      await goToConcertFromList(artistId, list[0] ? list[0].id : null, false);
    } else {
      showArtistConcertList(artistId, list);
    }
  }

  // 指定演者・タブの対象公演を返す（キャンセル除外・古い順）
  function _lvArtistConcerts(artistName, artistTab) {
    let pool = [];
    if (artistTab === 'all') {
      const seen = {};
      Object.values(state.concertsByYear || {}).forEach(arr => (arr || []).forEach(c => {
        if (c && c.id && !seen[c.id]) { seen[c.id] = true; pool.push(c); }
      }));
    } else {
      pool = (state.concertsByYear[artistTab] || []).slice();
    }
    return pool
      .filter(c => c.status !== 'キャンセル' && (c.artists || []).some(a => a.name === artistName))
      .sort((x, y) => (x.date || '').localeCompare(y.date || ''));
  }

  // 日付を YYYY/MM/DD (曜) 形式に整形（半角カッコ）
  function _lvFmtDate(iso) {
    const m = String(iso || '').match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!m) return String(iso || '');
    const d = new Date(m[1] + '-' + m[2] + '-' + m[3] + 'T00:00:00');
    const w = ['日','月','火','水','木','金','土'][d.getDay()];
    return m[1] + '/' + m[2] + '/' + m[3] + ' (' + w + ')';
  }

  // 【Ver2.8】演者別公演一覧（中間一覧）を表示
  function showArtistConcertList(artistId, list) {
    const artist = (state.artists || []).find(a => a.id === artistId);
    if (!artist) return;
    state._acArtistId = artistId;

    document.getElementById('ac-title').textContent = artist.name;

    // 統計（演者一覧と同じ・年タブ引き継ぎ）
    const tab = state.currentArtistTab;
    let attended, planned;
    if (tab === 'all') {
      attended = artist.total_attended || 0;
      planned  = artist.total_planned  || 0;
    } else {
      attended = (artist.by_year         && artist.by_year[tab])         || 0;
      planned  = (artist.by_year_planned && artist.by_year_planned[tab]) || 0;
    }
    document.getElementById('ac-stat').innerHTML =
      '参戦本数: <span class="ac-stat-num">' + attended + '</span>/<span class="ac-stat-num">' + planned + '</span>本';

    // 【①】この画面でも対象年を選べる年タブ
    const tabList = ['all'].concat(state.artistYears || []);
    document.getElementById('ac-year-tabs').innerHTML = tabList.map(t => {
      const label  = (t === 'all') ? 'すべて' : (t + '年');
      const active = (t === tab) ? ' active' : '';
      return `<div class="artist-year-tab${active}" onclick="_lvAcYearTab('${t}')">${label}</div>`;
    }).join('');

    // 1公演1行で描画（日付・会場は常に表示、形式・公演名/共演者は「…」で省略）
    document.getElementById('ac-list').innerHTML = list.map(c => {
      const venue = c.venue ? c.venue.name : '';
      const co    = (c.artists || []).filter(a => a.name !== artist.name).map(a => a.name);
      const parts = [];
      if (co.length > 0) {
        parts.push(esc(co.join('＆')));                                   // 共演者名のみ
      } else if (c.format && c.format !== '対バン') {
        // 【③】「ワンマン」は赤字、それ以外の形式は通常表示
        parts.push(c.format === 'ワンマン' ? `<span class="ac-oneman">${esc(c.format)}</span>` : esc(c.format));
      }
      if (c.performance_name) parts.push(esc(c.performance_name));
      const sub = parts.join('・');
      const fut   = c.is_future ? ' future' : '';
      return `<div class="ac-row${fut}" onclick="goToConcertFromList('${artistId}','${c.id}',true)">` +
             `<span class="ac-date">${esc(_lvFmtDate(c.date))}</span>` +
             `<span class="ac-venue">${esc(venue)}</span>` +
             (sub ? `<span class="ac-sub">${sub}</span>` : '') +
             `</div>`;
    }).join('');

    // 画面切替（switchTabは使わず.pageのactiveのみ切替・フッタータブは「演者一覧」のまま）
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-artist-concerts').classList.add('active');
    document.getElementById('filter-bar').style.display = 'none';
    document.getElementById('counter').style.display    = 'none';
    _lvSetMainPad(false);

    // 初期スクロール（すべて/当年＝本日に近い行へ、過去/未来年＝先頭）
    const curY = new Date().getFullYear();
    if (tab === 'all' || parseInt(tab) === curY) {
      const today = new Date().toISOString().slice(0, 10);
      const idx   = _findNearestIdx(list, today);
      const rows  = document.querySelectorAll('#ac-list .ac-row');
      if (idx > 0 && rows[idx]) rows[idx].scrollIntoView({ block: 'center' });
    } else {
      document.getElementById('ac-list').scrollTop = 0;
    }
  }

  // 【①】中間一覧内の年タブ切替（対象年を変えてその演者の公演を絞り直す）
  async function _lvAcYearTab(year) {
    if (!state._acArtistId) return;
    state.currentArtistTab = year;
    showToast('⏳ 公演データを取得中...', { persistent: true });
    try {
      if (year === 'all') await _ensureAllYearsConcerts();
      else                await _ensureYearConcerts(year);
    } finally {
      hideToast();
    }
    const artist = (state.artists || []).find(a => a.id === state._acArtistId);
    if (artist) showArtistConcertList(state._acArtistId, _lvArtistConcerts(artist.name, year));
  }

  function hideArtistConcertList() {
    document.getElementById('page-artist-concerts').classList.remove('active');
    document.getElementById('page-artists').classList.add('active');
    _lvSetMainPad(false);
    renderArtists(); // 年タブ変更を演者一覧にも反映
  }

  // 【Ver2.8】カード画面の「← 一覧に戻る」→ 中間一覧を再表示
  function _lvBackToArtistList() {
    if (!state._acArtistId) return;
    const artist = (state.artists || []).find(a => a.id === state._acArtistId);
    if (!artist) return;
    state.cameFromArtistList = false;
    _lvUpdateBackToListBtn();
    showArtistConcertList(state._acArtistId, _lvArtistConcerts(artist.name, state.currentArtistTab));
  }

  function _lvUpdateBackToListBtn() {
    const btn = document.getElementById('back-to-list-btn');
    if (btn) btn.style.display = state.cameFromArtistList ? 'block' : 'none';
  }

  // 【Ver2.8】中間一覧の行タップ（または1件直行）→ カード表示（その演者で絞り込み）
  async function goToConcertFromList(artistId, concertId, fromList) {
    const artist = (state.artists || []).find(a => a.id === artistId);
    if (!artist) return;
    const artistTab = state.currentArtistTab;

    switchTab('concerts'); // ここで cameFromArtistList は false にリセットされる

    if (artistTab === 'all') {
      state.concerts          = await _ensureAllYearsConcerts();
      state.currentFilterYear = 'all';
      state.filters = { artist: artist.name, year: null, prefecture: null };
    } else {
      state.concerts          = await _ensureYearConcerts(artistTab);
      state.currentFilterYear = artistTab;
      state.filters = { artist: artist.name, year: artistTab, prefecture: null };
    }

    state.selectedArtist     = artist.name;
    state.setlistCache       = {};
    state.cameFromArtistList = !!fromList; // switchTab後に設定
    renderConcerts();
    renderFilters();
    _lvUpdateBackToListBtn();

    // 初期位置：concertId指定があればその公演へ、無ければ従来ロジック
    const today = new Date().toISOString().slice(0, 10);
    const curY  = new Date().getFullYear();
    let idx = -1;
    if (concertId) idx = state.filteredConcerts.findIndex(c => c.id === concertId);
    if (idx < 0) {
      if (artistTab === 'all' || parseInt(artistTab) === curY) idx = _findNearestIdx(state.filteredConcerts, today);
      else idx = 0;
    }
    goTo(idx < 0 ? 0 : idx);
  }

  // ============================================================
  // 統計
  // ============================================================
  async function renderStats() {
    const content = document.getElementById('stats-content');
    content.innerHTML = `
      <div class="stats-year-nav">
        <button class="stats-year-btn" onclick="changeYear(-1)">◀</button>
        <div class="stats-year-label" id="stats-year-label">${state.currentYear}</div>
        <button class="stats-year-btn" onclick="changeYear(1)">▶</button>
      </div>
      <div style="text-align:center;padding:20px;color:var(--text-sub)">読み込み中...</div>
    `;

    try {
      const data = await apiGet('stats', { year: state.currentYear });
      state.statsData = data;
      renderStatsData(data);
    } catch(e) {
      content.innerHTML += `<div style="padding:16px;color:var(--text-sub)">取得失敗: ${e.message}</div>`;
    }
  }

  function renderStatsData(data) {
    const content = document.getElementById('stats-content');
    const concertTop = data.concert_ranking.slice(0, 10);
    const songTop    = data.song_ranking.slice(0, 10);

    const concertRows = concertTop.map((r, i) => `
      <div class="stats-rank-item">
        <span class="stats-rank-num">${i + 1}</span>
        <span class="stats-rank-name">${esc(r.name)}</span>
        <span class="stats-rank-count">${r.count}本</span>
      </div>
    `).join('');

    const songRows = songTop.map((r, i) => `
      <div class="stats-rank-item">
        <span class="stats-rank-num">${i + 1}</span>
        <span class="stats-rank-name">${esc(r.name)}</span>
        <span class="stats-rank-count">${r.count}回</span>
      </div>
    `).join('');

    const moreConBtn = data.concert_ranking.length > 10
      ? `<button class="stats-more-btn" onclick="showMore('concert')">もっと見る（全${data.concert_ranking.length}件）</button>` : '';
    const moreSongBtn = data.song_ranking.length > 10
      ? `<button class="stats-more-btn" onclick="showMore('song')">もっと見る（全${data.song_ranking.length}件）</button>` : '';

    content.innerHTML = `
      <div class="stats-year-nav">
        <button class="stats-year-btn" onclick="changeYear(-1)">◀</button>
        <div class="stats-year-label" id="stats-year-label">${state.currentYear}</div>
        <button class="stats-year-btn" onclick="changeYear(1)">▶</button>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">参戦本数</div>
        <div class="stats-total">${data.total_count}</div>
        <div class="stats-total-label">本</div>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">アーティスト別参戦本数</div>
        ${concertRows}
        ${moreConBtn}
      </div>
      <div class="stats-section">
        <div class="stats-section-title">楽曲演奏回数</div>
        ${songRows}
        ${moreSongBtn}
      </div>

    `;
  }

  async function changeYear(delta) {
    state.currentYear += delta;
    await renderStats();
  }

  function showMore(type) {
    if (!state.statsData) return;
    const data = type === 'concert' ? state.statsData.concert_ranking : state.statsData.song_ranking;
    const unit = type === 'concert' ? '本' : '回';
    const rows = data.map((r, i) => `
      <div class="stats-rank-item">
        <span class="stats-rank-num">${i + 1}</span>
        <span class="stats-rank-name">${esc(r.name)}</span>
        <span class="stats-rank-count">${r.count}${unit}</span>
      </div>
    `).join('');

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-title">全件表示</div>
      ${rows}
      <button class="modal-cancel-btn" onclick="closeModal()">閉じる</button>
    `;
    openModal();
  }

  async function clearCache() {
    try {
      await apiGet('clear_cache');
      state.setlistCache = {};
      showToast('✅ キャッシュをクリアしました');
    } catch(e) {
      showToast('❌ ' + e.message);
    }
  }

  // ============================================================
  // タブ切り替え
  // ============================================================
  // ヘッダーのフィルターバー表示に合わせて本文の上余白を調整（フィルター非表示のページは詰める）
  function _lvSetMainPad(showFilter) {
    const main = document.querySelector('.main');
    if (main) main.style.paddingTop = showFilter
      ? 'calc(env(safe-area-inset-top) + 48px + 36px)'
      : 'calc(env(safe-area-inset-top) + 48px)';
  }

  async function switchTab(tab) {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');

    state.currentTab = tab;

    // 【Ver2.8】通常のタブ操作では「中間一覧経由」フラグを解除
    state.cameFromArtistList = false;
    _lvUpdateBackToListBtn();

    // フィルターバー・カウンターの表示制御
    document.getElementById('filter-bar').style.display = tab === 'concerts' ? 'flex' : 'none';
    document.getElementById('counter').style.display    = tab === 'concerts' ? 'block' : 'none';
    _lvSetMainPad(tab === 'concerts');

    // 演者一覧へ遷移したらタブを「すべて」にリセット（仕様書5.12.3）
    if (tab === 'artists') {
      state.currentArtistTab = 'all';
      renderArtists();
    }

    if (tab === 'stats' && !state.statsData) {
      await renderStats();
    }

    if (tab === 'expedition' && !state.expeditionLoaded) {
      await expInit();
    }
  }

  // ============================================================
  // 更新
  // ============================================================
  async function doSync() {
    if (state._syncing) { showToast('更新中です'); return; }
    state._syncing = true;
    const syncIcon = document.getElementById('sync-icon');
    if (syncIcon) syncIcon.classList.add('syncing');
    showToast('🔄 更新中...', { persistent: true });
    try {
      // GAS側キャッシュクリア
      await fetch(GAS_URL + '?action=clear_cache').catch(() => {});
      // ブラウザ側メモリキャッシュクリア
      clearApiCache();
      // localStorageの公演データを全クリア
      Object.keys(localStorage)
        .filter(k => k.startsWith('lv_concerts_'))
        .forEach(k => localStorage.removeItem(k));
      showToast('🔄 公演データを取得中...', { persistent: true });
      const [concerts, artistsResp] = await Promise.all([
        apiGet('concerts', { year: state.currentFilterYear }),
        apiGet('artists_v2'),
      ]);

      const artists     = artistsResp.artists || [];
      const artistYears = artistsResp.years   || [];
      const artistStats = artistsResp.stats   || {};

      _lvSafeSetItem('lv_concerts_' + state.currentFilterYear, JSON.stringify(concerts));
      _lvSafeSetItem('lv_artists', JSON.stringify(artists));
      _lvSafeSetItem('lv_artist_years', JSON.stringify(artistYears));
      _lvSafeSetItem('lv_artist_stats', JSON.stringify(artistStats));

      state.concertsByYear[state.currentFilterYear] = concerts;
      state.concerts     = concerts;
      state.artists      = artists;
      state.artistYears  = artistYears;
      state.artistStats  = artistStats;
      state.setlistCache = {};
      state.statsData    = null;
      // localStorageのセットリストキャッシュを全クリア
      Object.keys(localStorage)
        .filter(k => k.startsWith('lv_setlist_'))
        .forEach(k => localStorage.removeItem(k));
      // アーティスト画像は GitHub Pages を直接参照するため、残存キャッシュのみ掃除する
      localStorage.removeItem('lv_artist_images');

      const now = new Date();
      state.syncTime = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      document.getElementById('sync-time').textContent = '最終同期: ' + state.syncTime;

      renderConcerts();
      renderFilters();
      renderArtists();
      goTo(state.currentIdx);

      showToast('✅ 更新しました');
    } catch(e) {
      showToast('❌ 更新失敗: ' + e.message);
    } finally {
      state._syncing = false;
      if (syncIcon) syncIcon.classList.remove('syncing');
    }
  }

  // ============================================================
  // トースト
  // ============================================================

  // ============================================================
  // 本日に最も近い公演のインデックスを返す（昇順配列前提）
  // 指定日以降で最も近い公演 → なければ最後の公演
  // ============================================================
  function _findNearestIdx(concerts, dateStr) {
    if (!concerts || concerts.length === 0) return 0;
    const idx = concerts.findIndex(c => c.date >= dateStr);
    if (idx >= 0) return idx;
    return concerts.length - 1; // 全て過去 → 最後（最新）
  }

  // ============================================================
  // 日付ジャンプ機能
  // ============================================================
  function openDateJump() {
    if (state.currentTab === 'expedition') { expOpenDateJump(); return; }
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-title">📅 日付ジャンプ</div>
      <div class="modal-item">
        <div class="modal-label">指定日以降で最も近い公演に移動します</div>
        <input class="modal-input" type="date" id="jump-date" value="${today}">
      </div>
      <button class="modal-save-btn" onclick="doDateJump()">ジャンプ</button>
      <button class="modal-cancel-btn" onclick="closeModal()">キャンセル</button>
    `;
    openModal();
  }

  function doDateJump() {
    const dateVal = document.getElementById('jump-date').value;
    if (!dateVal) return;

    const idx = _findNearestIdx(state.filteredConcerts, dateVal);

    if (state.filteredConcerts.length === 0) {
      showToast('該当する公演が見つかりません');
      return;
    }

    closeModal();
    goTo(idx);
    showToast(state.filteredConcerts[idx].date_label + ' にジャンプしました');
  }

  // ============================================================
  // 遠征管理タブ
  // ============================================================
  state.expedition = { subtab: 'checklist', days: [], idx: 0, loadedFrom: null, loadedTo: null, loading: false };

  async function expInit() {
    const track = document.getElementById('exp-track');
    track.innerHTML = '<div class="swiper-slide"><div class="exp-empty">読み込み中...（初回は手動入力シートの更新もあわせて行うため、数十秒かかる場合があります）</div></div>';
    document.getElementById('exp-dots').innerHTML = '';
    document.getElementById('exp-top-label').textContent = '';

    try {
      const today    = new Date();
      const todayIso = today.toISOString().slice(0, 10);
      const from = new Date(today.getTime() - 7  * 86400000).toISOString().slice(0, 10);
      const to   = new Date(today.getTime() + 15 * 86400000).toISOString().slice(0, 10);

      await expFetchRange(from, to, true);
      state.expedition.loadedFrom = from;
      state.expedition.loadedTo   = to;

      // 初期表示位置は「本日」、無ければ本日に一番近い未来の日
      const days = state.expedition.days;
      let idx = days.findIndex(d => d.date >= todayIso);
      if (idx < 0) idx = Math.max(days.length - 1, 0);
      expGoTo(idx, false);

      state.expeditionLoaded = true;
    } catch(e) {
      track.innerHTML = '<div class="swiper-slide"><div class="exp-empty">読み込みに失敗しました：' + esc(e.message) + '<br><br><span style="text-decoration:underline;cursor:pointer" onclick="expRetry()">タップして再試行</span></div></div>';
      state.expeditionLoaded = false;
    }
  }

  function expRetry() {
    expInit();
  }

  async function expFetchRange(from, to, replace) {
    const data = await apiGet('lv_expedition_checklist', { from, to });
    // 先頭側に日付が追加されるとidxがずれるため、現在表示中の日付を退避して後で復元する
    const currentDate = (!replace && state.expedition.days[state.expedition.idx])
      ? state.expedition.days[state.expedition.idx].date : null;

    if (replace) {
      state.expedition.days = data.days;
    } else {
      const existingDates = new Set(state.expedition.days.map(d => d.date));
      data.days.forEach(d => { if (!existingDates.has(d.date)) state.expedition.days.push(d); });
      state.expedition.days.sort((a, b) => a.date.localeCompare(b.date));
    }

    if (currentDate) {
      const restoredIdx = state.expedition.days.findIndex(d => d.date === currentDate);
      if (restoredIdx >= 0) state.expedition.idx = restoredIdx;
    }

    expRenderTrack();
  }

  function expRenderTrack() {
    const track = document.getElementById('exp-track');
    const dots  = document.getElementById('exp-dots');
    const days  = state.expedition.days;
    track.innerHTML = '';
    dots.innerHTML  = '';

    if (days.length === 0) {
      track.innerHTML = '<div class="swiper-slide"><div class="exp-empty">遠征予定はありません</div></div>';
      document.getElementById('exp-top-label').textContent = '';
      return;
    }

    days.forEach((day, i) => {
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
      slide.innerHTML = '<div class="exp-day">' + day.items.map(expBuildCard).join('') + '</div>';
      track.appendChild(slide);

      const dot = document.createElement('div');
      dot.className = 'exp-dot' + (i === state.expedition.idx ? ' active' : '');
      dots.appendChild(dot);
    });

    expGoTo(Math.min(state.expedition.idx, days.length - 1), false);
  }

  function expBuildCard(item) {
    const amount = (item.amount !== null && item.amount !== undefined) ? '¥' + item.amount.toLocaleString() : '¥ —';

    if (item.type === 'live') {
      const icon = item.isPlay ? '🎭' : '🎸';
      return `<div class="exp-card live">
        <div class="exp-card-live-name">${icon} ${esc(item.artist)}</div>
        ${item.perfName ? `<div class="exp-card-live-perfname">${esc(item.perfName)}</div>` : ''}
        ${item.venue ? `<div class="exp-card-live-venue">@${esc(item.venue)}</div>` : ''}
      </div>`;
    }

    if (item.type === 'transport') {
      return `<div class="exp-card transport tier-${item.statusTier}">
        <div class="exp-card-name">${esc(item.name || item.kind)}</div>
        <div class="exp-card-transport-route">${esc(item.depTime)} ${esc(item.depPlace)} → ${esc(item.arrTime)} ${esc(item.arrPlace)}${item.seat ? ' ／ ' + esc(item.seat) : ''}</div>
        <div class="exp-card-meta">
          <span class="exp-card-status">${item.statusIcon} ${esc(item.status)}</span>
          <span class="exp-card-amount">${amount}</span>
        </div>
      </div>`;
    }

    // hotel
    const dupClass = item.duplicate ? ' duplicate' : '';
    if (item.hotelPhase === 'staying') {
      return `<div class="exp-card hotel${dupClass}">
        <span class="exp-card-hotel-name">${esc(item.facility)}</span><span class="exp-card-hotel-suffix">（宿泊中）</span>
      </div>`;
    }
    return `<div class="exp-card hotel${dupClass}">
      <div style="margin-bottom:3px"><span class="exp-card-hotel-name">${esc(item.facility)}</span><span class="exp-card-hotel-suffix">（チェックイン）${item.duplicate ? ' ⚠️重複予約' : ''}</span></div>
      <div class="exp-card-route">${esc(item.site)}${item.reservationNo ? ' ／ ' + esc(item.reservationNo) : ''}</div>
      <div class="exp-card-meta">
        <span class="exp-card-status">${item.statusIcon} ${esc(item.status)}${item.cancelDeadline ? ' ／ 期限' + esc(item.cancelDeadline) : ''}</span>
        <span class="exp-card-amount">${amount}</span>
      </div>
    </div>`;
  }

  function expGoTo(idx, animate) {
    const days = state.expedition.days;
    if (idx < 0 || idx >= days.length) return;
    state.expedition.idx = idx;

    const track = document.getElementById('exp-track');
    if (animate === false) {
      track.style.transition = 'none';
      track.style.transform  = `translateX(-${idx * 100}%)`;
      track.offsetHeight;
      track.style.transition = '';
    } else {
      track.style.transform = `translateX(-${idx * 100}%)`;
    }

    document.getElementById('exp-top-label').textContent = days[idx].dateLabel;
    document.querySelectorAll('#exp-dots .exp-dot').forEach((d, i) => d.classList.toggle('active', i === idx));

    if (!state.expedition.loading) {
      if (idx <= 1) expLoadMore('backward');
      else if (idx >= days.length - 2) expLoadMore('forward');
    }
  }

  async function expLoadMore(direction) {
    state.expedition.loading = true;
    try {
      if (direction === 'backward') {
        if (!state.expedition.loadedFrom) return;
        const prevFrom = new Date(new Date(state.expedition.loadedFrom).getTime() - 30 * 86400000).toISOString().slice(0, 10);
        await expFetchRange(prevFrom, state.expedition.loadedFrom, false);
        state.expedition.loadedFrom = prevFrom;
      } else {
        if (!state.expedition.loadedTo) return;
        const nextTo = new Date(new Date(state.expedition.loadedTo).getTime() + 30 * 86400000).toISOString().slice(0, 10);
        await expFetchRange(state.expedition.loadedTo, nextTo, false);
        state.expedition.loadedTo = nextTo;
      }
    } finally {
      state.expedition.loading = false;
    }
  }

  let expTouchStartX = 0, expTouchStartY = 0;
  (function() {
    const sw = document.getElementById('exp-swiper');
    sw.addEventListener('touchstart', e => {
      expTouchStartX = e.touches[0].clientX;
      expTouchStartY = e.touches[0].clientY;
    }, { passive: true });
    sw.addEventListener('touchend', e => {
      if (state.expedition.subtab !== 'checklist') return;
      const dx = e.changedTouches[0].clientX - expTouchStartX;
      const dy = e.changedTouches[0].clientY - expTouchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        if (dx < 0) expGoTo(state.expedition.idx + 1);
        else        expGoTo(state.expedition.idx - 1);
      }
    }, { passive: true });
  })();

  function expSwitchSubtab(sub) {
    state.expedition.subtab = sub;
    document.querySelectorAll('.exp-subtab').forEach(t => t.classList.remove('active'));
    document.getElementById('exp-subtab-' + sub).classList.add('active');

    const showChecklist = sub === 'checklist';
    document.getElementById('exp-swiper').style.display      = showChecklist ? '' : 'none';
    document.getElementById('exp-dots').style.display        = showChecklist ? '' : 'none';
    document.getElementById('exp-topbar').style.display      = showChecklist ? '' : 'none';
    document.getElementById('exp-dash-swiper').style.display = showChecklist ? 'none' : '';
    document.getElementById('exp-dash-dots').style.display   = showChecklist ? 'none' : '';
    document.getElementById('exp-dash-topbar').style.display = showChecklist ? 'none' : '';

    if (!showChecklist && !state.expeditionDashboardLoaded) {
      expDashInit();
    }
  }

  // ---- 遠征一覧（B）：チェックリストと同じカード表現を流用 ----
  state.expeditionDash = { expeditions: [], idx: 0, loadedTo: null, loading: false };

  async function expDashInit() {
    const track = document.getElementById('exp-dash-track');
    track.innerHTML = '<div class="swiper-slide"><div class="exp-empty">読み込み中...</div></div>';
    document.getElementById('exp-dash-dots').innerHTML = '';
    document.getElementById('exp-dash-top-label').textContent = '';
    document.getElementById('exp-dash-top-sub').textContent = '';

    try {
      const today = new Date();
      const from  = today.toISOString().slice(0, 10);
      const to    = new Date(today.getTime() + 180 * 86400000).toISOString().slice(0, 10);
      await expDashFetchRange(from, to, true);
      state.expeditionDash.loadedTo = to;
      expDashGoTo(0, false);
      state.expeditionDashboardLoaded = true;
    } catch(e) {
      track.innerHTML = '<div class="swiper-slide"><div class="exp-empty">読み込みに失敗しました：' + esc(e.message) + '<br><br><span style="text-decoration:underline;cursor:pointer" onclick="expDashRetry()">タップして再試行</span></div></div>';
      state.expeditionDashboardLoaded = false;
    }
  }

  function expDashRetry() { expDashInit(); }

  async function expDashFetchRange(from, to, replace) {
    const data = await apiGet('lv_expedition_dashboard', { from, to });
    if (replace) {
      state.expeditionDash.expeditions = data.expeditions;
    } else {
      const existingStarts = new Set(state.expeditionDash.expeditions.map(x => x.startDate));
      data.expeditions.forEach(x => { if (!existingStarts.has(x.startDate)) state.expeditionDash.expeditions.push(x); });
      state.expeditionDash.expeditions.sort((a, b) => a.startDate.localeCompare(b.startDate));
    }
    expDashRenderTrack();
  }

  function expDashRenderTrack() {
    const track = document.getElementById('exp-dash-track');
    const dots  = document.getElementById('exp-dash-dots');
    const exps  = state.expeditionDash.expeditions;
    track.innerHTML = '';
    dots.innerHTML  = '';

    if (exps.length === 0) {
      track.innerHTML = '<div class="swiper-slide"><div class="exp-empty">遠征予定はありません</div></div>';
      document.getElementById('exp-dash-top-label').textContent = '';
      document.getElementById('exp-dash-top-sub').textContent = '';
      return;
    }

    exps.forEach((ex, i) => {
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
      const daysHtml = ex.days.map((day, di) =>
        '<div class="exp-day-block ' + (di % 2 === 0 ? 'alt-a' : 'alt-b') + '">' +
          '<div class="exp-daylabel">' + esc(day.dateLabel) + '</div>' +
          day.items.map(expBuildCard).join('') +
        '</div>'
      ).join('');
      slide.innerHTML = '<div class="exp-day">' + daysHtml +
        '<div class="exp-dash-tap-hint" onclick="expDashJumpToChecklist(\'' + ex.startDate + '\')">タップしてチェックリストで見る →</div>' +
      '</div>';
      track.appendChild(slide);

      const dot = document.createElement('div');
      dot.className = 'exp-dot' + (i === state.expeditionDash.idx ? ' active' : '');
      dots.appendChild(dot);
    });

    expDashGoTo(Math.min(state.expeditionDash.idx, exps.length - 1), false);
  }

  function expDashGoTo(idx, animate) {
    const exps = state.expeditionDash.expeditions;
    if (idx < 0 || idx >= exps.length) return;
    state.expeditionDash.idx = idx;

    const track = document.getElementById('exp-dash-track');
    if (animate === false) {
      track.style.transition = 'none';
      track.style.transform  = `translateX(-${idx * 100}%)`;
      track.offsetHeight;
      track.style.transition = '';
    } else {
      track.style.transform = `translateX(-${idx * 100}%)`;
    }

    const ex = exps[idx];
    document.getElementById('exp-dash-top-label').textContent = ex.periodLabel;
    document.getElementById('exp-dash-top-sub').textContent =
      [ex.prefecture, ex.concertCount ? ex.concertCount + '公演' : ''].filter(Boolean).join(' ／ ');
    document.querySelectorAll('#exp-dash-dots .exp-dot').forEach((d, i) => d.classList.toggle('active', i === idx));

    if (idx >= exps.length - 2 && !state.expeditionDash.loading) expDashLoadMore();
  }

  async function expDashLoadMore() {
    if (!state.expeditionDash.loadedTo) return;
    state.expeditionDash.loading = true;
    try {
      const nextTo = new Date(new Date(state.expeditionDash.loadedTo).getTime() + 180 * 86400000).toISOString().slice(0, 10);
      await expDashFetchRange(state.expeditionDash.loadedTo, nextTo, false);
      state.expeditionDash.loadedTo = nextTo;
    } finally {
      state.expeditionDash.loading = false;
    }
  }

  let expDashTouchStartX = 0, expDashTouchStartY = 0;
  (function() {
    const sw = document.getElementById('exp-dash-swiper');
    sw.addEventListener('touchstart', e => {
      expDashTouchStartX = e.touches[0].clientX;
      expDashTouchStartY = e.touches[0].clientY;
    }, { passive: true });
    sw.addEventListener('touchend', e => {
      if (state.expedition.subtab !== 'dashboard') return;
      const dx = e.changedTouches[0].clientX - expDashTouchStartX;
      const dy = e.changedTouches[0].clientY - expDashTouchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        if (dx < 0) expDashGoTo(state.expeditionDash.idx + 1);
        else        expDashGoTo(state.expeditionDash.idx - 1);
      }
    }, { passive: true });
  })();

  // 遠征一覧のカードをタップ → チェックリストへ遷移し、その遠征の最初の日付から表示（仕様4.4）
  async function expDashJumpToChecklist(dateIso) {
    expSwitchSubtab('checklist');

    let idx = state.expedition.days.findIndex(d => d.date === dateIso);
    if (idx < 0) {
      const from = new Date(new Date(dateIso).getTime() - 3  * 86400000).toISOString().slice(0, 10);
      const to   = new Date(new Date(dateIso).getTime() + 15 * 86400000).toISOString().slice(0, 10);
      await expFetchRange(from, to, false);
      if (!state.expedition.loadedFrom || from < state.expedition.loadedFrom) state.expedition.loadedFrom = from;
      if (!state.expedition.loadedTo   || to   > state.expedition.loadedTo)   state.expedition.loadedTo   = to;
      idx = state.expedition.days.findIndex(d => d.date === dateIso);
    }
    if (idx >= 0) expGoTo(idx);
  }

  function expOpenDateJump() {
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-title">📅 日付ジャンプ</div>
      <div class="modal-item">
        <div class="modal-label">指定日に最も近い日付へ移動します</div>
        <input class="modal-input" type="date" id="exp-jump-date" value="${today}">
      </div>
      <button class="modal-save-btn" onclick="expDoDateJump()">ジャンプ</button>
      <button class="modal-cancel-btn" onclick="closeModal()">キャンセル</button>
    `;
    openModal();
  }

  function expDoDateJump() {
    const dateVal = document.getElementById('exp-jump-date').value;
    if (!dateVal) return;
    const days = state.expedition.days;
    if (days.length === 0) { showToast('遠征予定が見つかりません'); return; }
    let idx = days.findIndex(d => d.date >= dateVal);
    if (idx < 0) idx = days.length - 1;
    closeModal();
    expGoTo(idx);
    showToast(days[idx].dateLabel + ' にジャンプしました');
  }

  function showToast(msg, options = {}) {
    const t = document.getElementById('toast');
    t.textContent = msg;

    // options.action があれば、その場で再実行できるボタンを付ける（課題④ 再試行導線）
    if (options.action && typeof options.onAction === 'function') {
      const btn = document.createElement('span');
      btn.textContent = options.action;
      btn.style.marginLeft     = '10px';
      btn.style.textDecoration = 'underline';
      btn.style.fontWeight     = '700';
      btn.style.cursor         = 'pointer';
      btn.onclick = function() { t.classList.remove('show'); options.onAction(); };
      t.appendChild(btn);
    }

    t.classList.add('show');

    // persistent: true の場合は自動消去しない
    if (!options.persistent) {
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  }

  function hideToast() {
    document.getElementById('toast').classList.remove('show');
  }

  // ============================================================
  // セトリキャッシュ LRU上限（Phase 2／仕様書9.4.5.3）
  //   セトリキャッシュ(lv_setlist_*)が無制限に肥大するのを防ぐ。
  //   合計が上限(2MB)を超えたら、最終アクセスが古い順に削除する。
  //   lv_setlist_meta に { liveId: 最終アクセス日時 } を保持して判定する。
  // ============================================================
  const LV_SETLIST_CACHE_LIMIT = 2 * 1024 * 1024; // 2MB

  // セトリの読み込み・保存時に最終アクセス日時を記録する。
  // enforce=true（＝保存時）のときだけ上限チェック・削除を実行する。
  function _lvTouchSetlistCache(liveId, enforce) {
    let meta = {};
    try {
      const raw = localStorage.getItem('lv_setlist_meta');
      if (raw) meta = JSON.parse(raw);
    } catch(e) { meta = {}; }
    meta[liveId] = new Date().toISOString();
    _lvSafeSetItem('lv_setlist_meta', JSON.stringify(meta));
    if (enforce) _lvEnforceSetlistCacheLimit();
  }

  function _lvEnforceSetlistCacheLimit() {
    try {
      // lv_setlist_meta を除くセトリキャッシュの合計サイズを算出
      const keys = Object.keys(localStorage).filter(k =>
        k.indexOf('lv_setlist_') === 0 && k !== 'lv_setlist_meta');
      let total = 0;
      keys.forEach(k => { const v = localStorage.getItem(k); total += v ? v.length : 0; });
      if (total <= LV_SETLIST_CACHE_LIMIT) return;

      let meta = {};
      try { meta = JSON.parse(localStorage.getItem('lv_setlist_meta') || '{}'); } catch(e) {}

      // 最終アクセスが古い順に並べ、上限以下になるまで削除
      const items = keys.map(k => ({
        key:    k,
        liveId: k.slice('lv_setlist_'.length),
        t:      meta[k.slice('lv_setlist_'.length)] || ''
      }));
      items.sort((a, b) => (a.t || '').localeCompare(b.t || ''));

      for (const it of items) {
        if (total <= LV_SETLIST_CACHE_LIMIT) break;
        const v = localStorage.getItem(it.key);
        try { localStorage.removeItem(it.key); } catch(e) {}
        total -= v ? v.length : 0;
        delete meta[it.liveId];
      }
      _lvSafeSetItem('lv_setlist_meta', JSON.stringify(meta));
    } catch(e) {}
  }

  // ============================================================
  // localStorage 安全書き込み（Phase 1）
  //   保存に失敗しても例外を投げず起動・動作を継続させる。
  //   失敗時はセッション中1回だけトーストで通知する。
  // ============================================================
  function _lvSafeSetItem(key, value) {
    try {
      localStorage.setItem(key, value);
      return true;
    } catch(e) {
      console.warn('⚠️ localStorage書き込み失敗: ' + key + ' (' + e.name + ': ' + e.message + ')');
      if (!state._storageWarned) {
        state._storageWarned = true;
        showToast('⚠️ 端末のキャッシュ保存に失敗しました（動作には影響ありません）');
      }
      return false;
    }
  }

  // ============================================================
  // 障害復旧機構（Phase 1仕上げ／仕様書9.5・引き継ぎ書9章）
  //   起動失敗画面に「修復」「再認可」導線を出し、端末側の破損から自力復旧できるようにする。
  // ============================================================
  async function _lvRepairStorage() {
    try { localStorage.clear(); } catch(e) {}
    try { sessionStorage.clear(); } catch(e) {}
    try {
      if (navigator.serviceWorker) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) { try { await r.unregister(); } catch(e) {} }
      }
    } catch(e) {}
    try {
      if (window.caches) {
        const keys = await caches.keys();
        for (const k of keys) { try { await caches.delete(k); } catch(e) {} }
      }
    } catch(e) {}
    location.reload();
  }

  async function _lvShowStartupError(e) {
    const msg     = (e && e.message) ? e.message : String(e);
    const msgEl   = document.getElementById('loading-msg');
    const spinner = document.querySelector('#loading .spinner');
    if (spinner) spinner.style.display = 'none';

    // ストレージ自己診断（表示のみ・起動は止めない）
    let diag = '';
    try {
      if (navigator.storage && navigator.storage.estimate) {
        const est = await navigator.storage.estimate();
        if (est.quota === 0 || (est.quota && est.usage / est.quota > 0.95)) {
          diag = '端末側ストレージに異常がある可能性があります。「修復する」を試し、直らない場合は下の復旧ページをお試しください。';
        }
      }
    } catch(_) {}

    msgEl.textContent = 'エラー: ' + msg;
    if (diag) {
      const d = document.createElement('div');
      d.style.marginTop = '10px';
      d.textContent = diag;
      msgEl.appendChild(d);
    }

    const actions = document.getElementById('loading-actions');
    actions.innerHTML = '';

    const repair = document.createElement('button');
    repair.className   = 'loading-btn';
    repair.textContent = '🔧 修復する（保存データを消して再起動）';
    repair.onclick     = _lvRepairStorage;
    actions.appendChild(repair);

    // fetch自体の失敗（Load failed系）＝サーバー認可切れの可能性
    const isFetchFail = (e instanceof TypeError) ||
                        /load failed|failed to fetch|networkerror/i.test(msg);
    if (isFetchFail) {
      const reauth = document.createElement('button');
      reauth.className   = 'loading-btn';
      reauth.textContent = '🔑 再認可ページを開く';
      reauth.onclick     = function() { window.open(GAS_URL + '?action=years', '_blank'); };
      actions.appendChild(reauth);
      const note = document.createElement('div');
      note.className   = 'loading-note';
      note.textContent = 'サーバーの再認可が必要な可能性があります。開いた画面で「許可」してください。';
      actions.appendChild(note);
    }

    const resetNote = document.createElement('div');
    resetNote.className = 'loading-note';
    resetNote.innerHTML = 'それでも直らない場合は <a href="reset.html">復旧ページ</a> を開いてください。';
    actions.appendChild(resetNote);
  }

  // ============================================================
  // セトリ限定更新（Ver1.8新規）
  // ============================================================
  async function refreshSetlistData(liveId) {
    showToast('⏳ セトリを更新中...', { persistent: true });
    
    try {
      // ① GAS APIからセトリ再取得
      //    force=1: サーバー側キャッシュを強制クリアして再取得
      //    _t:      apiGetのメモリキャッシュもバイパス（毎回必ず最新を取得）
      const data = await apiGet('setlist', { liveId, force: '1', _t: Date.now() });
      
      // ② localStorage に全セトリを保存（仕様書 10.5.1）
      _lvSafeSetItem(`lv_setlist_${liveId}`, JSON.stringify(data));
      _lvTouchSetlistCache(liveId, true);
      
      // ③ メモリキャッシュに保存（仕様書 10.5.1）
      state.setlistCache[liveId] = data;
      
      // ④ セトリ統計キャッシュをクリア（仕様書 10.5.1）
      state.statsData = null;
      
      // ⑤ 現在のセトリを再描画（仕様書 10.5.2）
      renderSetlist(state.currentIdx, data);
      
      // ⑥ 完了メッセージ表示
      showToast('✅ セトリを更新しました');
      closeModal();
      
    } catch(e) {
      // ⑦ エラー処理（仕様書 9.6）
      if (!navigator.onLine) {
        showToast('❌ セトリ更新失敗: ネットワークエラー');
      } else if (e.message && e.message.includes('429')) {
        showToast('⏳ API制限中です。しばらく待ってから再度お試しください');
      } else if (e.message && e.message.includes('timeout')) {
        showToast('❌ セトリ更新失敗: タイムアウト');
      } else {
        showToast('❌ セトリ更新失敗: ' + e.message);
      }
    }
  }

  // ============================================================
  // ユーティリティ
  // ============================================================
  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
